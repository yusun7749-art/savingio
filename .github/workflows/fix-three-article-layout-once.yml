name: Fix three article layouts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-layout:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore approved two-column article position
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [
              Path('articles/credit-score-management.html'),
              Path('articles/debit-card-vs-credit-card.html'),
              Path('articles/dehumidifier-electricity-saving.html'),
          ]

          override = '''\n/* Three-article position correction: approved two-column DNA */
.header-inner,.footer-inner{max-width:1180px}
.site-grid{max-width:1180px;grid-template-columns:minmax(0,760px) 270px;gap:54px}
@media(max-width:1180px){.site-grid{grid-template-columns:minmax(0,760px) 250px;gap:34px}.right-rail{padding-top:100px}}
@media(max-width:980px){.site-grid{display:block;max-width:820px}}
'''

          for path in files:
              text = path.read_text(encoding='utf-8')
              if '<aside class="left-rail"' in text:
                  raise SystemExit(f'left rail unexpectedly remains in {path}')
              marker = '/* Three-article position correction: approved two-column DNA */'
              if marker in text:
                  continue
              if '</style>' not in text:
                  raise SystemExit(f'missing style end in {path}')
              text = text.replace('</style>', override + '</style>', 1)
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit position correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles/credit-score-management.html articles/debit-card-vs-credit-card.html articles/dehumidifier-electricity-saving.html
          git diff --cached --quiet && exit 0
          git commit -m "Restore two-column position on three articles"
          git push
