name: Remove unintended left rail blocks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-left-rail:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove only left rail blocks from three articles
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          files = [
              Path('articles/credit-score-management.html'),
              Path('articles/debit-card-vs-credit-card.html'),
              Path('articles/dehumidifier-electricity-saving.html'),
          ]
          pattern = re.compile(r'<aside class="left-rail"[^>]*>.*?</aside>', re.S)

          for path in files:
              text = path.read_text(encoding='utf-8')
              updated, count = pattern.subn('', text, count=1)
              if count != 1:
                  raise SystemExit(f'expected one left-rail block in {path}, found {count}')
              path.write_text(updated, encoding='utf-8')
          PY
      - name: Commit exact correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles/credit-score-management.html articles/debit-card-vs-credit-card.html articles/dehumidifier-electricity-saving.html
          git diff --cached --quiet && exit 0
          git commit -m "Remove unintended left rail blocks from three articles"
          git push
