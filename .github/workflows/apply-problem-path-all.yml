name: Apply compact problem paths to all articles

on:
  push:
    branches: [main]
    paths:
      - 'factory/article_connection_batch.py'
      - 'css/article-layout-dna.css'
      - '.github/workflows/apply-problem-path-all.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: savingio-problem-path-migration
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply compact path HTML to every article
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path
          from factory.article_connection_batch import build_batches, run

          root = Path('.').resolve()
          batches, _ = build_batches(root, batch_size=50)
          reports = []
          for number in range(1, len(batches) + 1):
              reports.append(run(root, number, batch_size=50, apply=True))

          css_path = root / 'css' / 'article-layout-dna.css'
          css = css_path.read_text(encoding='utf-8')
          marker = '/* Savingio compact problem path v2 */'
          if marker not in css:
              css += '''

/* Savingio compact problem path v2 */
.savingio-article-dna .savingio-problem-path {
  margin: 48px 0 34px;
  padding: 28px;
  border: 1px solid #dbe5f3;
  border-radius: 22px;
  background: linear-gradient(180deg,#f8fbff 0%,#fff 100%);
  box-shadow: 0 12px 30px rgba(23,105,255,.06);
}
.savingio-article-dna .savingio-problem-path h2 { margin: 0 0 8px; font-size: clamp(25px,3vw,32px); line-height: 1.3; }
.savingio-article-dna .savingio-problem-path > p { margin: 0 0 20px; color: #667085; line-height: 1.65; }
.savingio-article-dna .savingio-path-steps { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
.savingio-article-dna .savingio-path-step {
  display: flex; flex-direction: column; justify-content: space-between;
  min-width: 0; min-height: 116px; padding: 18px;
  border: 1px solid #dbe5f3; border-radius: 16px; background: #fff;
  color: #25324b; text-decoration: none; line-height: 1.45;
  box-shadow: 0 4px 14px rgba(15,23,42,.03);
}
.savingio-article-dna .savingio-path-step strong {
  display: -webkit-box; overflow: hidden; color: #183153; font-size: 16px; line-height: 1.45;
  -webkit-box-orient: vertical; -webkit-line-clamp: 2;
}
.savingio-article-dna .savingio-path-step span {
  display: inline-flex; align-self: flex-start; margin-top: 12px; padding: 5px 9px;
  border-radius: 999px; background: #f1f5f9; color: #64748b; font-size: 12px; font-weight: 700;
}
.savingio-article-dna .savingio-path-step[aria-current="step"] { border-color: #1769ff; background: #eef4ff; box-shadow: 0 8px 22px rgba(23,105,255,.12); }
.savingio-article-dna .savingio-path-step[aria-current="step"] strong { color: #0f58d5; }
.savingio-article-dna .savingio-path-step[aria-current="step"] span { background: #1769ff; color: #fff; }
@media(max-width:720px){
  .savingio-article-dna .savingio-problem-path { padding: 20px; }
  .savingio-article-dna .savingio-path-steps { grid-template-columns: 1fr; }
  .savingio-article-dna .savingio-path-step { min-height: 0; }
}
'''
              css_path.write_text(css, encoding='utf-8', newline='')

          failures = []
          checked = 0
          section_re = re.compile(r'<section\b[^>]*data-savingio-problem-path=["\'][^"\']+["\'][^>]*>(.*?)</section>', re.I | re.S)
          for path in sorted((root / 'articles').glob('*.html')):
              if path.name.lower() == 'index.html':
                  continue
              html = path.read_text(encoding='utf-8')
              match = section_re.search(html)
              if not match:
                  continue
              checked += 1
              count = len(re.findall(r'class=["\'][^"\']*savingio-path-step[^"\']*["\']', match.group(1), re.I))
              if count < 2 or count > 6:
                  failures.append({'file': path.as_posix(), 'card_count': count})
              if '/css/article-layout-dna.css?v=2' not in html:
                  failures.append({'file': path.as_posix(), 'error': 'layout_css_v2_missing'})

          report = {
              'version': 'V3.028',
              'article_batches': len(batches),
              'article_reports': reports,
              'checked_problem_paths': checked,
              'failures': failures,
              'pass': not failures,
          }
          out = root / 'factory' / 'output' / 'problem_path_full_migration.json'
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding='utf-8')
          if failures:
              raise SystemExit(json.dumps(failures, ensure_ascii=False, indent=2))
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Commit migrated article files
        run: |
          if git diff --quiet; then
            echo 'No article changes required.'
            exit 0
          fi
          git config user.name 'Savingio Factory'
          git config user.email 'actions@users.noreply.github.com'
          git add articles css/article-layout-dna.css factory/output/article_connection_batches factory/output/problem_path_full_migration.json
          git commit -m 'V3.028 apply compact problem paths to all articles [skip ci]'
          git push
