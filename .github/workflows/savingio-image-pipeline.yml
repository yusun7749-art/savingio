name: Savingio Image Pipeline

on:
  push:
    branches: [main]
    paths:
      - "factory/image_pipeline.py"
      - "images/articles/**"
      - ".github/workflows/savingio-image-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply repository thumbnails to articles
        run: python factory/image_pipeline.py

      - name: Verify no placeholder images remain in pilot articles
        run: |
          ! grep -n "placehold.co" articles/apartment-leak-emergency-response.html
          ! grep -n "placehold.co" articles/daily-liability-leak-insurance.html
          ! grep -n "placehold.co" articles/home-water-leak-self-check.html
          grep -n "savingio.com/images/articles/apartment-leak-emergency-response.svg" articles/apartment-leak-emergency-response.html
          grep -n "savingio.com/images/articles/daily-liability-leak-insurance.svg" articles/daily-liability-leak-insurance.html
          grep -n "savingio.com/images/articles/home-water-leak-self-check.svg" articles/home-water-leak-self-check.html

      - name: Commit generated article connections
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "savingio-factory-bot"
          git config user.email "savingio-factory-bot@users.noreply.github.com"
          git add articles/apartment-leak-emergency-response.html \
                  articles/daily-liability-leak-insurance.html \
                  articles/home-water-leak-self-check.html
          git commit -m "V3.022 connect leak article thumbnails"
          git push
