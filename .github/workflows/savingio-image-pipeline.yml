name: Savingio Image Pipeline

on:
  push:
    branches: [main]
    paths:
      - "factory/image_pipeline.py"
      - "factory/fix_traffic_article_layout.py"
      - "images/articles/**"
      - ".github/workflows/savingio-image-pipeline.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install layout parser
        run: python -m pip install beautifulsoup4

      - name: Apply repository thumbnails to articles
        run: python factory/image_pipeline.py

      - name: Repair traffic article layout
        run: python factory/fix_traffic_article_layout.py

      - name: Verify repository image connections
        run: |
          files=(
            apartment-leak-emergency-response
            daily-liability-leak-insurance
            home-water-leak-self-check
            traffic-fines-difference-guide
            ai-side-hustles-beginner
            air-conditioner-electricity-saving
            aircon-dry-mode-electricity
            aircon-filter-cleaning-savings
          )
          for slug in "${files[@]}"; do
            test -f "images/articles/${slug}.svg"
            ! grep -n "placehold.co" "articles/${slug}.html"
            grep -n "savingio.com/images/articles/${slug}.svg" "articles/${slug}.html"
            grep -n 'data-factory-hero="true"' "articles/${slug}.html"
          done

      - name: Verify traffic article layout DNA
        run: |
          python - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup

          path = Path("articles/traffic-fines-difference-guide.html")
          soup = BeautifulSoup(path.read_text(encoding="utf-8"), "html.parser")
          grid = soup.select_one("section.quick-grid")
          author = soup.select_one(".savingio-author-box")
          assert grid is not None
          assert author is not None
          assert grid.select_one(".savingio-author-box") is None
          assert author.find_next_sibling("h2").get_text(" ", strip=True) == "3초 요약"
          first_card = grid.find("article", recursive=False)
          assert first_card is not None
          assert first_card.select_one("section.savingio-related") is None
          assert first_card.select_one("section.source-note") is None
          print("PASS: traffic article layout DNA")
          PY

      - name: Commit generated article connections
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "savingio-factory-bot"
          git config user.email "savingio-factory-bot@users.noreply.github.com"
          git add articles/apartment-leak-emergency-response.html \
                  articles/daily-liability-leak-insurance.html \
                  articles/home-water-leak-self-check.html \
                  articles/traffic-fines-difference-guide.html \
                  articles/ai-side-hustles-beginner.html \
                  articles/air-conditioner-electricity-saving.html \
                  articles/aircon-dry-mode-electricity.html \
                  articles/aircon-filter-cleaning-savings.html
          git commit -m "V3.024 normalize traffic article layout"
          git push
