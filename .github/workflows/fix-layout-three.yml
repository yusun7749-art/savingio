name: Fix layout three
on: [push]
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python - <<'PY'
          from pathlib import Path
          files=[Path('articles/credit-score-management.html'),Path('articles/debit-card-vs-credit-card.html'),Path('articles/dehumidifier-electricity-saving.html')]
          css='''\n/* approved-two-column-position */\n.header-inner,.footer-inner{max-width:1180px}\n.site-grid{max-width:1180px;grid-template-columns:minmax(0,760px) 270px;gap:54px}\n@media(max-width:1180px){.site-grid{grid-template-columns:minmax(0,760px) 250px;gap:34px}.right-rail{padding-top:100px}}\n@media(max-width:980px){.site-grid{display:block;max-width:820px}}\n'''
          for p in files:
              t=p.read_text(encoding='utf-8')
              if 'approved-two-column-position' not in t:
                  t=t.replace('</style>',css+'</style>',1)
                  p.write_text(t,encoding='utf-8')
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add articles/credit-score-management.html articles/debit-card-vs-credit-card.html articles/dehumidifier-electricity-saving.html
          git diff --cached --quiet || git commit -m "Restore correct positions on three articles"
          git push
