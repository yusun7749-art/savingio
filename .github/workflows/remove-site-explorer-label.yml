name: Remove SITE EXPLORER labels

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-labels:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove only the unintended labels
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          files = [
              Path('articles/credit-score-management.html'),
              Path('articles/debit-card-vs-credit-card.html'),
              Path('articles/dehumidifier-electricity-saving.html'),
          ]
          target = '<span class="rail-kicker">SITE EXPLORER</span>'

          for path in files:
              text = path.read_text(encoding='utf-8')
              if target not in text:
                  raise SystemExit(f'missing target in {path}')
              updated = text.replace(target, '', 1)
              if updated.count('SITE EXPLORER') != text.count('SITE EXPLORER') - 1:
                  raise SystemExit(f'unexpected replacement count in {path}')
              path.write_text(updated, encoding='utf-8')
          PY
      - name: Commit exact correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles/credit-score-management.html articles/debit-card-vs-credit-card.html articles/dehumidifier-electricity-saving.html
          git diff --cached --quiet && exit 0
          git commit -m "Remove unintended SITE EXPLORER labels"
          git push
