name: Savingio Article Batch QA

on:
  workflow_dispatch:
    inputs:
      offset:
        description: Start offset in alphabetically sorted article files
        required: false
        default: "25"
      limit:
        description: Number of articles to process
        required: false
        default: "5"
  push:
    branches: [main]
    paths:
      - "factory/article_batch_qa.py"
      - "factory/article_batch_editorial_patch.py"
      - "factory/fix_traffic_article_layout.py"
      - "factory/adsense_content_depth_audit.py"
      - ".github/workflows/article-batch-qa.yml"

permissions:
  contents: write

concurrency:
  group: savingio-article-batch-qa
  cancel-in-progress: false

jobs:
  normalize-and-audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QA dependencies
        run: python -m pip install --disable-pip-version-check beautifulsoup4

      - name: Set batch parameters
        id: batch
        shell: bash
        run: |
          echo "offset=${{ github.event.inputs.offset || '25' }}" >> "$GITHUB_OUTPUT"
          echo "limit=${{ github.event.inputs.limit || '5' }}" >> "$GITHUB_OUTPUT"

      - name: Repair traffic article layout idempotently
        run: python factory/fix_traffic_article_layout.py

      - name: Apply curated problem-solving editorial DNA
        run: python factory/article_batch_editorial_patch.py

      - name: Process bounded article batch
        run: |
          python factory/article_batch_qa.py \
            --offset "${{ steps.batch.outputs.offset }}" \
            --limit "${{ steps.batch.outputs.limit }}" \
            --apply

      - name: Verify traffic layout
        run: |
          python - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup
          path = Path('articles/traffic-fines-difference-guide.html')
          soup = BeautifulSoup(path.read_text(encoding='utf-8'), 'html.parser')
          titles = [h for h in soup.select('h1,h2,h3,h4,h5,h6') if h.get_text(' ', strip=True) == '3초 요약']
          grids = soup.select('section.quick-grid')
          authors = soup.select('.savingio-author-box')
          thumbs = soup.select('.factory-article-thumb')
          assert len(titles) == 1, f'Expected one 3초 요약 title, found {len(titles)}'
          assert len(grids) == 1, f'Expected one quick-grid, found {len(grids)}'
          assert len(authors) == 1, f'Expected one author box, found {len(authors)}'
          assert len(thumbs) == 1, f'Expected one thumbnail, found {len(thumbs)}'
          assert titles[0].find_next_sibling() is grids[0]
          assert authors[0].find_next_sibling() is titles[0]
          print('traffic-layout=PASS')
          PY

      - name: Verify report and problem-solving DNA
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('factory/ARTICLE_BATCH_QA.json').read_text(encoding='utf-8'))
          assert data['selected_count'] > 0, 'No article selected'
          assert data['selected_count'] <= int('${{ steps.batch.outputs.limit }}')
          assert data.get('dna_version') == '7', 'Article DNA version is not 7'
          assert data.get('editorial_qa') == 'problem-solving-v1', 'Problem-solving QA is disabled'
          assert data.get('minimum_visible_characters') == 5000, 'Minimum visible characters is not locked to 5000'
          assert all(a['visible_characters'] >= 5000 for a in data['articles']), 'Editorial length below 5000 characters'
          assert all(a['has_thumbnail_file'] and a['has_thumbnail_markup'] for a in data['articles']), 'Thumbnail missing'
          assert all(a['has_og_image'] and a['has_twitter_image'] for a in data['articles']), 'Social image metadata missing'
          assert all(a['has_author_box'] for a in data['articles']), 'Author box missing'
          assert all(a['has_faq_schema'] and a['has_article_schema'] for a in data['articles']), 'Schema missing'
          assert all(a['has_canonical'] for a in data['articles']), 'Canonical missing'
          assert all(a['related_article_links'] >= 2 for a in data['articles']), 'Related links missing'
          assert all(a['category'] for a in data['articles']), 'Category missing'
          assert all(all(a['required_sections'].values()) for a in data['articles']), 'Required section missing'
          assert all(a['problem_solving']['enabled'] for a in data['articles']), 'Problem-solving marker missing'
          assert all(a['problem_solving']['complete'] for a in data['articles']), 'Problem-solving decision flow incomplete'
          assert all(a['layout_uniqueness']['complete'] for a in data['articles']), 'Duplicate layout block detected'
          assert all(a['status'] == 'PASS' for a in data['articles']), 'Strict article gate failed'
          assert data['fix_count'] == 0, 'Batch still contains FIX articles'
          print('selected=', data['selected_count'])
          print('changed=', data['changed_count'])
          print('pass=', data['pass_count'])
          print('fix=', data['fix_count'])
          print('problem-solving=PASS')
          print('layout-uniqueness=PASS')
          PY

      - name: Run AdSense content depth audit
        run: |
          python factory/adsense_content_depth_audit.py \
            --offset "${{ steps.batch.outputs.offset }}" \
            --limit "${{ steps.batch.outputs.limit }}"

      - name: Commit verified changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No file changes"
            exit 0
          fi
          git config user.name "savingio-factory"
          git config user.email "actions@users.noreply.github.com"
          git add articles images/articles factory/ARTICLE_BATCH_QA.json factory/ADSENSE_CONTENT_DEPTH_QA.json
          git commit -m "Part batch apply AdSense depth QA offset ${{ steps.batch.outputs.offset }} limit ${{ steps.batch.outputs.limit }}"
          git push
