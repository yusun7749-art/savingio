name: Savingio Article Batch QA

on:
  workflow_dispatch:
    inputs:
      offset:
        description: Start offset in alphabetically sorted article files
        required: false
        default: "25"
      limit:
        description: Number of articles to process
        required: false
        default: "5"
  push:
    branches: [main]
    paths:
      - "factory/article_batch_qa.py"
      - "factory/article_batch_editorial_patch.py"
      - "factory/fix_traffic_article_layout.py"
      - ".github/workflows/article-batch-qa.yml"

permissions:
  contents: write

concurrency:
  group: savingio-article-batch-qa
  cancel-in-progress: false

jobs:
  normalize-and-audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QA dependencies
        run: python -m pip install --disable-pip-version-check beautifulsoup4

      - name: Set batch parameters
        id: batch
        shell: bash
        run: |
          echo "offset=${{ github.event.inputs.offset || '25' }}" >> "$GITHUB_OUTPUT"
          echo "limit=${{ github.event.inputs.limit || '5' }}" >> "$GITHUB_OUTPUT"

      - name: Repair traffic article layout idempotently
        run: python factory/fix_traffic_article_layout.py

      - name: Apply curated editorial completion
        run: python factory/article_batch_editorial_patch.py

      - name: Process bounded article batch
        run: |
          python factory/article_batch_qa.py \
            --offset "${{ steps.batch.outputs.offset }}" \
            --limit "${{ steps.batch.outputs.limit }}" \
            --apply

      - name: Verify traffic layout
        run: |
          python - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup
          path = Path('articles/traffic-fines-difference-guide.html')
          soup = BeautifulSoup(path.read_text(encoding='utf-8'), 'html.parser')
          titles = [
              h for h in soup.select('h2.quick-summary-title')
              if h.get_text(' ', strip=True) == '3초 요약'
          ]
          assert len(titles) == 1, f'Expected one 3초 요약 title, found {len(titles)}'
          grid = soup.select_one('section.quick-grid')
          author = soup.select_one('.savingio-author-box')
          assert grid is not None and author is not None
          assert titles[0].find_next_sibling() is grid
          assert author.find_next_sibling() is titles[0]
          print('traffic-layout=PASS')
          PY

      - name: Verify report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('factory/ARTICLE_BATCH_QA.json').read_text(encoding='utf-8'))
          assert data['selected_count'] > 0, 'No article selected'
          assert data['selected_count'] <= int('${{ steps.batch.outputs.limit }}')
          assert all(a['visible_characters'] >= 3500 for a in data['articles']), 'Editorial length below minimum'
          assert all(a['has_thumbnail_file'] for a in data['articles']), 'Thumbnail file missing'
          assert all(a['has_thumbnail_markup'] for a in data['articles']), 'Thumbnail markup missing'
          assert all(a['has_og_image'] for a in data['articles']), 'OG image missing'
          assert all(a['has_twitter_image'] for a in data['articles']), 'Twitter image missing'
          assert all(a['has_author_box'] for a in data['articles']), 'Author box missing'
          assert all(a['has_faq_schema'] and a['has_article_schema'] for a in data['articles']), 'Schema missing'
          assert all(a['has_canonical'] for a in data['articles']), 'Canonical missing'
          assert all(a['related_article_links'] >= 2 for a in data['articles']), 'Related links missing'
          assert all(a['category'] for a in data['articles']), 'Category missing'
          assert all(all(a['required_sections'].values()) for a in data['articles']), 'Required section missing'
          assert data['fix_count'] == 0, 'Batch still contains FIX articles'
          print('selected=', data['selected_count'])
          print('changed=', data['changed_count'])
          print('pass=', data['pass_count'])
          print('fix=', data['fix_count'])
          PY

      - name: Commit verified changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No file changes"
            exit 0
          fi
          git config user.name "savingio-factory"
          git config user.email "actions@users.noreply.github.com"
          git add articles images/articles factory/ARTICLE_BATCH_QA.json
          git commit -m "Part batch normalize and audit offset ${{ steps.batch.outputs.offset }} limit ${{ steps.batch.outputs.limit }}"
          git push
