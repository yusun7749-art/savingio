name: Savingio Site Integrity Audit

on:
  push:
    branches: [main]
    paths-ignore:
      - 'factory/SITE_INTEGRITY_REPORT.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Audit all local links and assets
        id: audit
        continue-on-error: true
        run: python factory/site_integrity_audit.py

      - name: Persist audit report on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "savingio-audit-bot"
          git config user.email "savingio-audit-bot@users.noreply.github.com"
          git add factory/SITE_INTEGRITY_REPORT.json
          if git diff --cached --quiet; then
            echo "Audit report unchanged"
          else
            git commit -m "Audit: refresh full-site integrity report [skip ci]"
            git push
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: savingio-site-integrity-report
          path: factory/SITE_INTEGRITY_REPORT.json
          if-no-files-found: error

      - name: Enforce integrity gate
        if: steps.audit.outcome == 'failure'
        run: |
          echo "Savingio integrity audit found blocking errors."
          exit 1
