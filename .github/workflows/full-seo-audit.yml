name: Full Savingio SEO Audit

on:
  push:
    branches: [main]
    paths:
      - 'articles/**'
      - 'factory/seo_audit.py'
      - '.github/workflows/full-seo-audit.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run full SEO audit
        run: python factory/seo_audit.py

      - name: Commit SEO audit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add factory/SEO_AUDIT/seo-audit.json factory/SEO_AUDIT/seo-audit.md
          git diff --cached --quiet || git commit -m "Update full SEO audit report"
          git push

      - name: Upload SEO audit reports
        uses: actions/upload-artifact@v4
        with:
          name: savingio-full-seo-audit
          path: factory/SEO_AUDIT/
          if-no-files-found: error
