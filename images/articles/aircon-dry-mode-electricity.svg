<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d"><title id="t">에어컨 제습모드 전기세 차이</title><desc id="d">냉방모드와 제습모드의 차이를 비교하는 세이빙이오 썸네일</desc><defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0ea5e9"/><stop offset="1" stop-color="#2563eb"/></linearGradient><linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#14b8a6"/><stop offset="1" stop-color="#0f766e"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity=".16"/></filter></defs><rect width="1200" height="630" rx="36" fill="#eef9ff"/><rect x="66" y="60" width="1068" height="510" rx="34" fill="white" filter="url(#s)"/><text x="110" y="122" fill="#1769ff" font-size="30" font-family="Arial,sans-serif" font-weight="800">SAVINGIO · 에어컨</text><text x="110" y="198" fill="#12213a" font-size="54" font-family="Arial,sans-serif" font-weight="900">제습모드가 더 쌀까?</text><text x="110" y="246" fill="#64748b" font-size="27" font-family="Arial,sans-serif" font-weight="700">냉방과 제습, 상황에 따라 답이 다릅니다</text><g transform="translate(110 298)"><rect width="440" height="206" rx="26" fill="url(#g1)"/><text x="36" y="58" fill="white" font-size="34" font-weight="900">냉방모드</text><circle cx="350" cy="62" r="38" fill="#fff" opacity=".94"/><text x="350" y="75" text-anchor="middle" fill="#2563eb" font-size="30" font-weight="900">❄</text><text x="36" y="112" fill="#dbeafe" font-size="24">실내 온도를 빠르게 낮출 때</text><text x="36" y="158" fill="white" font-size="29" font-weight="800">온도 중심 운전</text></g><g transform="translate(650 298)"><rect width="440" height="206" rx="26" fill="url(#g2)"/><text x="36" y="58" fill="white" font-size="34" font-weight="900">제습모드</text><circle cx="350" cy="62" r="38" fill="#fff" opacity=".94"/><path d="M350 34c-20 27-28 38-28 53a28 28 0 0 0 56 0c0-15-8-26-28-53z" fill="#14b8a6"/><text x="36" y="112" fill="#ccfbf1" font-size="24">습도가 높고 끈적할 때</text><text x="36" y="158" fill="white" font-size="29" font-weight="800">습도 중심 운전</text></g><rect x="286" y="522" width="628" height="50" rx="15" fill="#eff6ff"/><text x="600" y="555" text-anchor="middle" fill="#1769ff" font-size="23" font-weight="900">전기요금은 설정온도·습도·기기 방식으로 판단</text></svg>