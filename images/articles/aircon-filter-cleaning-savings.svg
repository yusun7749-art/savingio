<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d"><title id="t">에어컨 필터 청소로 전기세 줄이기</title><desc id="d">먼지 낀 에어컨 필터와 깨끗한 필터를 비교하는 세이빙이오 썸네일</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f766e"/><stop offset="1" stop-color="#22c55e"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity=".16"/></filter></defs><rect width="1200" height="630" rx="36" fill="#f0fbf4"/><rect x="68" y="62" width="1064" height="506" rx="34" fill="white" filter="url(#s)"/><rect x="68" y="62" width="390" height="506" rx="34" fill="url(#g)"/><text x="108" y="126" fill="white" font-size="30" font-family="Arial,sans-serif" font-weight="700">SAVINGIO · 냉방비</text><text x="108" y="212" fill="white" font-size="52" font-family="Arial,sans-serif" font-weight="900">필터만 청소해도</text><text x="108" y="275" fill="#dcfce7" font-size="37" font-family="Arial,sans-serif" font-weight="800">냉방 효율이 달라집니다</text><g transform="translate(112 340)"><rect width="245" height="136" rx="20" fill="white"/><rect x="26" y="24" width="193" height="84" rx="10" fill="#d1fae5" stroke="#0f766e" stroke-width="6"/><path d="M50 38v56M78 38v56M106 38v56M134 38v56M162 38v56M190 38v56M38 54h168M38 78h168" stroke="#0f766e" stroke-width="4"/></g><g transform="translate(520 116)"><text x="0" y="0" fill="#142b24" font-size="34" font-weight="900">청소 전</text><rect x="0" y="32" width="240" height="220" rx="22" fill="#f5f5f4"/><rect x="28" y="60" width="184" height="140" rx="12" fill="#d6d3d1" stroke="#78716c" stroke-width="6"/><circle cx="74" cy="100" r="12" fill="#78716c"/><circle cx="124" cy="132" r="15" fill="#57534e"/><circle cx="170" cy="92" r="10" fill="#78716c"/><circle cx="160" cy="162" r="13" fill="#57534e"/><text x="120" y="238" text-anchor="middle" fill="#78716c" font-size="22" font-weight="800">바람 약함 · 냄새 · 전력 낭비</text></g><g transform="translate(835 116)"><text x="0" y="0" fill="#142b24"