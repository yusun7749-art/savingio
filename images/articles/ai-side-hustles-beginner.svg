<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d"><title id="t">초보자를 위한 AI 부업 시작 방법</title><desc id="d">노트북과 체크리스트로 현실적인 AI 부업 준비 순서를 보여주는 세이빙이오 썸네일</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#3b2f80"/><stop offset="1" stop-color="#7c3aed"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity=".16"/></filter></defs><rect width="1200" height="630" rx="36" fill="#f4f0ff"/><rect x="70" y="62" width="1060" height="506" rx="34" fill="white" filter="url(#s)"/><rect x="70" y="62" width="430" height="506" rx="34" fill="url(#g)"/><text x="112" y="128" fill="white" font-size="30" font-family="Arial,sans-serif" font-weight="700">SAVINGIO · 부업</text><text x="112" y="214" fill="white" font-size="58" font-family="Arial,sans-serif" font-weight="900">AI 부업</text><text x="112" y="282" fill="#ede9fe" font-size="38" font-family="Arial,sans-serif" font-weight="800">처음이라면 이렇게</text><rect x="115" y="345" width="270" height="145" rx="18" fill="#fff" opacity=".96"/><rect x="140" y="368" width="220" height="88" rx="10" fill="#ede9fe"/><path d="M170 430l35-32 28 24 36-43 53 51" fill="none" stroke="#7c3aed" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><rect x="130" y="478" width="240" height="12" rx="6" fill="#d8b4fe"/><g transform="translate(548 112)"><rect width="500" height="95" rx="20" fill="#f7f5ff"/><circle cx="48" cy="48" r="28" fill="#7c3aed"/><text x="48" y="58" text-anchor="middle" fill="white" font-size="26" font-weight="900">1</text><text x="98" y="42" fill="#211a3d" font-size="29" font-weight="900">할 수 있는 일부터 정리</text><text x="98" y="72" fill="#6b6480" font-size="20">글쓰기 · 자료정리 · 디자인 보조</text></g><g transform="translate(548 225)"><rect width="500" height="95" rx="20" fill="#f7f5ff"/><circle cx="48" cy="48" r="28" fill="#7c3aed"/><text x="48" y="58" text-anchor="middle" fill="white" font-size="26" font-weight="900