<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
<title id="title">우리 집 누수 의심될 때 셀프 체크 순서</title><desc id="desc">수도계량기, 세면대 하부, 세탁기 호스 점검을 표현한 세이빙이오 대표 이미지</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#effaf5"/><stop offset="1" stop-color="#dff1e9"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-opacity=".14"/></filter></defs>
<rect width="1200" height="630" rx="36" fill="url(#bg)"/><circle cx="1070" cy="85" r="145" fill="#cce9dc"/><circle cx="1060" cy="585" r="175" fill="#c7e5d8"/>
<g transform="translate(70 65)"><rect width="170" height="50" rx="25" fill="#286b57"/><text x="85" y="33" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="white">누수 셀프 체크</text></g>
<text x="70" y="185" font-family="Arial,sans-serif" font-weight="800" font-size="54" fill="#214d40">우리 집 누수 의심될 때</text><text x="70" y="252" font-family="Arial,sans-serif" font-weight="800" font-size="48" fill="#214d40">먼저 확인할 5가지</text>
<g filter="url(#s)" transform="translate(690 86)"><rect width="410" height="440" rx="28" fill="white"/><circle cx="205" cy="145" r="92" fill="#edf7f2" stroke="#8fc4b0" stroke-width="5"/><circle cx="205" cy="145" r="58" fill="white" stroke="#8fc4b0" stroke-width="5"/><path d="M205 145l35-23" stroke="#286b57" stroke-width="9" stroke-linecap="round"/><circle cx="205" cy="145" r="8" fill="#286b57"/><path d="M135 250h140" stroke="#5c8476" stroke-width="18" stroke-linecap="round"/><path d="M205 250v55" stroke="#5c8476" stroke-width="18" stroke-linecap="round"/><circle cx="205" cy="323" r="30" fill="#286b57"/><path d="M190 323h30M205 308v30" stroke="white" stroke-width="7" stroke-linecap="round"/><rect x="55" y="370" width="300" height="42" rx="21" fill="#eaf5f0"/><text x="205" y="398" text-anchor="middle" font-family="Arial,sans-serif" font-size="19" font-weight="700" fill="#286b57">계량기 · 배관 · 호스 · 바닥 확인</text></g>
<g transform="translate(70 335)"><rect width="520" height="165" rx="24" fill="white" opacity=".97"/><text x="34" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#214d40">① 모든 수도를 잠그고 계량기 확인</text><text x="34" y="91" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#214d40">② 싱크대·세면대·세탁기 주변 점검</text><text x="34" y="134" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#214d40">③ 이상 지속 시 관리실·전문가 호출</text></g>
<text x="70" y="575" font-family="Arial,sans-serif" font-size="28" font-weight="800" fill="#286b57">Savingio</text><text x="205" y="575" font-family="Arial,sans-serif" font-size="21" fill="#607d72">돈이 되는 생활정보</text>
