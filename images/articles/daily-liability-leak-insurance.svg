<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
<title id="title">일배책 누수 보험 처리, 아랫집 피해 접수 순서</title><desc id="desc">보험 증권, 누수 피해 사진, 사고 접수와 보상 서류 흐름을 표현한 세이빙이오 대표 이미지</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f1f6ff"/><stop offset="1" stop-color="#dce8f7"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#203b5d" flood-opacity=".16"/></filter></defs>
<rect width="1200" height="630" rx="36" fill="url(#bg)"/><circle cx="1080" cy="90" r="175" fill="#ccdcf1"/><circle cx="1030" cy="590" r="210" fill="#c7d9ef" opacity=".8"/>
<g transform="translate(64 56)"><rect width="164" height="50" rx="25" fill="#274c77"/><text x="82" y="33" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="21" fill="#fff">누수 보험</text></g>
<text x="64" y="176" font-family="Arial,sans-serif" font-weight="800" font-size="55" fill="#203b5d">일배책 누수 보험 처리</text><text x="64" y="244" font-family="Arial,sans-serif" font-weight="800" font-size="47" fill="#203b5d">접수 전에 확인할 순서</text>
<g transform="translate(650 70)" filter="url(#shadow)"><rect width="470" height="485" rx="30" fill="#fff"/><rect x="42" y="38" width="250" height="300" rx="20" fill="#f8fbff" stroke="#98b1d0" stroke-width="4"/><rect x="75" y="74" width="184" height="28" rx="14" fill="#274c77"/><path d="M78 138h178M78 176h145M78 214h166M78 252h126" stroke="#b6c8dc" stroke-width="14" stroke-linecap="round"/><circle cx="235" cy="293" r="38" fill="#4aa3c0"/><path d="M216 293l13 13 27-31" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><g transform="translate(310 44)"><rect width="118" height="125" rx="18" fill="#eaf1f9"/><path d="M28 30h62v55H28z" fill="#fff" stroke="#7d9abc" stroke-width="5"/><path d="M35 73l17-18 14 12 18-24" fill="none" stroke="#4aa3c0" stroke-width="7" stroke-linecap="round"/><text x="59" y="109" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#274c77">피해 사진</text></g><g transform="translate(310 186)"><rect width="118" height="125" rx="18" fill="#eaf1f9"/><rect x="31" y="24" width="56" height="60" rx="10" fill="#fff" stroke="#7d9abc" stroke-width="5"/><path d="M42 43h34M42 59h34" stroke="#4aa3c0" stroke-width="7" stroke-linecap="round"/><text x="59" y="109" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#274c77">수리 견적</text></g><g transform="translate(68 365)"><rect width="334" height="72" rx="20" fill="#e8f0f9"/><circle cx="44" cy="36" r="23" fill="#274c77"/><path d="M33 36l8 8 17-20" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><text x="82" y="44" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#274c77">특약 확인 → 사고 접수 → 서류 제출</text></g></g>
<g transform="translate(64 325)" filter="url(#shadow)"><rect width="520" height="170" rx="24" fill="#fff"/><text x="30" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#203b5d">① 가족 보험의 일상생활배상책임 확인</text><text x="30" y="93" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#203b5d">② 원인 수리와 피해 복구 비용을 구분</text><text x="30" y="138" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#203b5d">③ 합의 전에 보험사 담당자와 확인</text></g>
<text x="64" y="578" font-family="Arial,sans-serif" font-size="28" font-weight="800" fill="#274c77">Savingio</text><text x="200" y="578" font-family="Arial,sans-serif" font-size="20" fill="#60758f">돈이 되는 생활정보</text>
