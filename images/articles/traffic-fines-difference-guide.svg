<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d"><title id="t">교통벌금·범칙금·과태료 차이</title><desc id="d">고지서와 교통 표지판을 비교해 범칙금, 과태료, 벌금의 차이를 설명하는 세이빙이오 썸네일</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f4c81"/><stop offset="1" stop-color="#1769ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-opacity=".18"/></filter></defs><rect width="1200" height="630" rx="36" fill="#eef4ff"/><circle cx="1060" cy="86" r="150" fill="#d9e8ff"/><rect x="68" y="64" width="1064" height="502" rx="32" fill="white" filter="url(#s)"/><rect x="68" y="64" width="380" height="502" rx="32" fill="url(#g)"/><text x="112" y="128" fill="white" font-size="30" font-family="Arial,sans-serif" font-weight="700">SAVINGIO · 자동차</text><text x="112" y="210" fill="white" font-size="54" font-family="Arial,sans-serif" font-weight="900">고지서 받았다면</text><text x="112" y="275" fill="#dceaff" font-size="34" font-family="Arial,sans-serif" font-weight="700">먼저 이것부터 구분</text><g transform="translate(120 330)"><circle cx="72" cy="72" r="68" fill="#fff"/><path d="M42 75h60M48 54h48M54 96h36" stroke="#1769ff" stroke-width="12" stroke-linecap="round"/><circle cx="72" cy="72" r="56" fill="none" stroke="#ef4444" stroke-width="10"/></g><g transform="translate(500 115)"><rect width="566" height="108" rx="22" fill="#f5f8ff"/><circle cx="58" cy="54" r="31" fill="#1769ff"/><text x="58" y="66" text-anchor="middle" fill="white" font-size="30" font-weight="900">1</text><text x="112" y="46" fill="#17233b" font-size="31" font-weight="900">범칙금</text><text x="112" y="80" fill="#667085" font-size="22">운전자 확인 · 벌점 가능성 확인</text></g><g transform="translate(500 245)"><rect width="566" height="108" rx="22" fill="#fff8ed"/><circle cx="58" cy="54" r="31" fill="#f59e0b"/><text x="58" y="66" text-anchor="middle" fill="white" font-size="30" font-weight="900">2</text><text x="112" y="46" fill="#17233b" font-size="31" font-weight="900">과태료</text><text x="112" y="80" fill="#667085" font-size="22">차량 소유자 · 사전통지 확인</text></g><g transform="translate(500 375)"><rect width="566" height="108" rx="22" fill="#fff1f2"/><circle cx="58" cy="54" r="31" fill="#ef4444"/><text x="58" y="66" text-anchor="middle" fill="white" font-size="30" font-weight="900">3</text><text x="112" y="46" fill="#17233b" font-size="31" font-weight="900">벌금</text><text x="112" y="80" fill="#667085" font-size="22">형사처분 · 납부기관 구분</text></g><text x="500" y="532" fill="#1769ff" font-size="27" font-weight="900">조회 → 확인 → 납부 순서까지 한 번에</text></svg>