<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="t d"><title id="t">에어컨 전기요금 줄이는 실전 방법</title><desc id="d">에어컨 온도 설정과 선풍기 병행, 필터 청소를 보여주는 세이빙이오 썸네일</desc><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b6ea8"/><stop offset="1" stop-color="#14b8a6"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity=".16"/></filter></defs><rect width="1200" height="630" rx="36" fill="#edfafa"/><rect x="68" y="62" width="1064" height="506" rx="34" fill="white" filter="url(#s)"/><rect x="68" y="62" width="430" height="506" rx="34" fill="url(#g)"/><text x="112" y="128" fill="white" font-size="30" font-family="Arial,sans-serif" font-weight="700">SAVINGIO · 전기요금</text><text x="112" y="214" fill="white" font-size="53" font-family="Arial,sans-serif" font-weight="900">에어컨 전기세</text><text x="112" y="278" fill="#d9ffff" font-size="36" font-family="Arial,sans-serif" font-weight="800">이렇게 줄이세요</text><g transform="translate(120 344)"><rect width="250" height="108" rx="24" fill="white"/><rect x="28" y="28" width="194" height="35" rx="12" fill="#dff7f7"/><path d="M58 78c25 18 50 18 75 0M137 78c25 18 50 18 75 0" fill="none" stroke="#0f8c98" stroke-width="8" stroke-linecap="round"/></g><g transform="translate(545 112)"><rect width="500" height="96" rx="20" fill="#f2fbfb"/><circle cx="52" cy="48" r="30" fill="#0f8c98"/><text x="52" y="58" text-anchor="middle" fill="white" font-size="24" font-weight="900">26°</text><text x="104" y="42" fill="#12333b" font-size="28" font-weight="900">적정온도 유지</text><text x="104" y="73" fill="#63757a" font-size="20">껐다 켰다보다 안정적인 운전</text></g><g transform="translate(545 228)"><rect width="500" height="96" rx="20" fill="#f2fbfb"/><circle cx="52" cy="48" r="30" fill="#14b8a6"/><path d="M52 22v52M26 48h52" stroke="white" stroke-width="8" stroke-linecap="round"/><text x="104" y="42" fill="#12333b" font-size="28" font-weight="900">선풍기 함께 사용</text><text x="104" y="73" fill="#63757a" font-size="20">찬 공기를 방 전체로 빠르게 순환</text></g><g transform="translate(545 344)"><rect width="500" height="96" rx="20" fill="#f2fbfb"/><circle cx="52" cy="48" r="30" fill="#0ea5e9"/><path d="M34 31h36v34H34zM40 38h24M40 46h24M40 54h24" fill="none" stroke="white" stroke-width="5"/></g><text x="649" y="386" fill="#12333b" font-size="28" font-weight="900">필터 청소</text><text x="649" y="417" fill="#63757a" font-size="20">냉방 효율 저하와 낭비 방지</text><rect x="545" y="475" width="500" height="55" rx="16" fill="#dff7f7"/><text x="795" y="511" text-anchor="middle" fill="#087f8c" font-size="25" font-weight="900">인버터·제습모드 오해까지 정리</text></svg>