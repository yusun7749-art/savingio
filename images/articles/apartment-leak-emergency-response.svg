<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
<title id="title">아랫집 누수 연락을 받았을 때 윗집이 바로 할 일</title><desc id="desc">아랫집 천장 누수, 윗집 수도 밸브 잠금, 관리사무소 연락과 현장 촬영을 표현한 세이빙이오 대표 이미지</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#edf9fb"/><stop offset="1" stop-color="#d5edf2"/></linearGradient><linearGradient id="wall" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#eef5f6"/></linearGradient><filter id="shadow"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#123d48" flood-opacity=".16"/></filter></defs>
<rect width="1200" height="630" rx="36" fill="url(#bg)"/><circle cx="1080" cy="95" r="170" fill="#c7e8ee" opacity=".85"/><circle cx="1030" cy="585" r="210" fill="#c2e4eb" opacity=".7"/>
<g transform="translate(64 56)"><rect width="196" height="50" rx="25" fill="#0b6170"/><text x="98" y="33" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="21" fill="#fff">누수 긴급 대응</text></g>
<text x="64" y="176" font-family="Arial,sans-serif" font-weight="800" font-size="55" fill="#143c49">아랫집에서 누수 연락이 왔다면</text><text x="64" y="244" font-family="Arial,sans-serif" font-weight="800" font-size="47" fill="#143c49">책임보다 먼저 피해를 멈추세요</text>
<g transform="translate(650 70)" filter="url(#shadow)"><rect width="470" height="485" rx="30" fill="#fff"/><rect x="34" y="34" width="402" height="210" rx="20" fill="url(#wall)" stroke="#9ccbd3" stroke-width="4"/><path d="M45 155h380" stroke="#9fb8bd" stroke-width="10"/><path d="M122 155c20 25 50 45 83 45s62-20 82-45" fill="none" stroke="#65b7c9" stroke-width="12" stroke-linecap="round"/><path d="M205 82c-30 43-43 67-43 88a43 43 0 0 0 86 0c0-21-13-45-43-88z" fill="#38a8c1"/><path d="M328 85v88" stroke="#405f66" stroke-width="14" stroke-linecap="round"/><circle cx="328" cy="188" r="34" fill="#0b6170"/><path d="M310 188h36M328 170v36" stroke="#fff" stroke-width="8" stroke-linecap="round"/><g transform="translate(45 275)"><rect width="110" height="145" rx="18" fill="#eaf5f7"/><circle cx="55" cy="42" r="22" fill="#5fb8cb"/><path d="M30 83h50M30 104h50M30 125h34" stroke="#55747b" stroke-width="9" stroke-linecap="round"/><text x="55" y="139" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#0b6170">현장 촬영</text></g><g transform="translate(180 275)"><rect width="110" height="145" rx="18" fill="#eaf5f7"/><path d="M30 43h50M55 20v46" stroke="#0b6170" stroke-width="12" stroke-linecap="round"/><circle cx="55" cy="91" r="24" fill="#5fb8cb"/><text x="55" y="139" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#0b6170">밸브 잠금</text></g><g transform="translate(315 275)"><rect width="110" height="145" rx="18" fill="#eaf5f7"/><rect x="28" y="24" width="54" height="82" rx="9" fill="#fff" stroke="#5d858e" stroke-width="5"/><path d="M39 45h32M39 62h32M39 79h22" stroke="#5fb8cb" stroke-width="7" stroke-linecap="round"/><text x="55" y="139" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="700" fill="#0b6170">관리실 접수</text></g></g>
<g transform="translate(64 325)" filter="url(#shadow)"><rect width="520" height="170" rx="24" fill="#fff"/><text x="30" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#143c49">① 세탁기·욕실·싱크대 물 사용 중지</text><text x="30" y="93" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#143c49">② 양쪽 집의 피해 위치와 시간을 기록</text><text x="30" y="138" font-family="Arial,sans-serif" font-size="24" font-weight="700" fill="#143c49">③ 관리사무소·집주인·보험사에 접수</text></g>
<text x="64" y="578" font-family="Arial,sans-serif" font-size="28" font-weight="800" fill="#0b6170">Savingio</text><text x="200" y="578" font-family="Arial,sans-serif" font-size="20" fill="#4f7178">돈이 되는 생활정보</text>
</svg>