<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
<title id="title">아랫집 누수 연락을 받았을 때 윗집이 바로 할 일</title><desc id="desc">아파트 천장 누수와 수도 밸브 잠금, 관리사무소 연락을 표현한 세이빙이오 대표 이미지</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#e8f8fb"/><stop offset="1" stop-color="#d6eef5"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-opacity=".14"/></filter></defs>
<rect width="1200" height="630" rx="36" fill="url(#bg)"/><circle cx="1050" cy="80" r="130" fill="#c9e9f0"/><circle cx="1100" cy="560" r="180" fill="#c2e5ee"/>
<g transform="translate(70 65)"><rect width="170" height="50" rx="25" fill="#0b6170"/><text x="85" y="33" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="white">누수 긴급 대응</text></g>
<text x="70" y="190" font-family="Arial,sans-serif" font-weight="800" font-size="58" fill="#143c49">아랫집 누수 연락!</text><text x="70" y="260" font-family="Arial,sans-serif" font-weight="800" font-size="48" fill="#143c49">윗집이 가장 먼저 할 일</text>
<g filter="url(#s)" transform="translate(675 90)"><rect width="430" height="440" rx="28" fill="white"/><rect x="35" y="38" width="360" height="160" rx="18" fill="#eef7f9" stroke="#8fcbd6" stroke-width="4"/><path d="M215 65 C185 110 170 135 170 158a45 45 0 0 0 90 0c0-23-15-48-45-93z" fill="#36a9c5"/><path d="M132 215h166v20H132z" fill="#c0dce3"/><path d="M215 235v68" stroke="#355f69" stroke-width="18" stroke-linecap="round"/><circle cx="215" cy="315" r="35" fill="#0b6170"/><path d="M195 315h40M215 295v40" stroke="white" stroke-width="8" stroke-linecap="round"/><rect x="55" y="365" width="140" height="44" rx="22" fill="#e7f4f7"/><text x="125" y="394" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#0b6170">물 사용 중지</text><rect x="235" y="365" width="140" height="44" rx="22" fill="#e7f4f7"/><text x="305" y="394" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="700" fill="#0b6170">관리실 연락</text></g>
<g transform="translate(70 340)"><rect width="520" height="160" rx="24" fill="white" opacity=".96"/><text x="34" y="48" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#143c49">① 물 사용 즉시 중지</text><text x="34" y="90" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#143c49">② 양쪽 현장 사진·영상 기록</text><text x="34" y="132" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#143c49">③ 관리사무소·보험사 연락</text></g>
<text x="70" y="575" font-family="Arial,sans-serif" font-size="28" font-weight="800" fill="#0b6170">Savingio</text><text x="205" y="575" font-family="Arial,sans-serif" font-size="21" fill="#4d6f78">돈이 되는 생활정보</text>
</svg>