<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>퇴직금 계산기 | Savingio</title><meta name="description" content="최근 3개월 임금과 재직일수로 예상 퇴직금을 계산합니다."><link rel="canonical" href="https://savingio.com/calculators/severance.html"><link rel="stylesheet" href="/css/style.css"></head><body><header class="site-header"><a class="logo" href="/">Savingio</a><nav><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a></nav></header><main class="calc-shell"><section class="calc-hero"><span class="section-kicker">퇴직 계산</span><h1>퇴직금 계산기</h1><p>간단한 평균임금 방식으로 예상 금액을 확인합니다.</p></section><section class="calc-card"><div class="field-grid"><div class="field"><label for="pay3">최근 3개월 임금 합계(원)</label><input id="pay3" type="number" value="9000000"></div><div class="field"><label for="days3">최근 3개월 총일수</label><input id="days3" type="number" value="92"></div><div class="field"><label for="serviceDays">총 재직일수</label><input id="serviceDays" type="number" value="1095"></div></div><div class="calc-actions"><button class="btn btn-primary" onclick="calcSev()">계산하기</button></div><div id="sevResult" class="result" hidden></div><div class="calc-note">상여금, 연차수당, 평균임금 산정 예외 등에 따라 실제 퇴직금은 달라질 수 있습니다.</div></section></main><script>function won(n){return Math.round(n).toLocaleString("ko-KR")+"원"}function calcSev(){const p=+pay3.value||0,d=+days3.value||1,s=+serviceDays.value||0,avg=p/d,sev=avg*30*(s/365);sevResult.hidden=false;sevResult.innerHTML=`예상 퇴직금<strong>${won(sev)}</strong><div class="result-grid"><div><span>1일 평균임금</span>${won(avg)}</div><div><span>재직기간</span>${Math.floor(s/365)}년 ${s%365}일</div></div>`}</script></body></html>
