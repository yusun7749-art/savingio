<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>퇴직금 계산기 | Savingio</title><meta name="description" content="최근 3개월 임금과 재직일수를 기준으로 예상 퇴직금을 계산합니다."><link rel="stylesheet" href="../css/style.css?v=4"></head><body><header class="site-header"><div class="header-inner"><a class="logo" href="/">Savingio</a><nav class="nav"><a href="/">홈</a><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a><a href="/about.html">소개</a><a href="/contact.html">문의</a></nav></div></header><main class="calculator-wrap"><div class="calc-card"><h1>퇴직금 계산기</h1><p class="desc">최근 3개월 임금과 재직일수를 기준으로 예상 퇴직금을 계산합니다.</p><div class="form-grid"><div class="field"><label>최근 3개월 임금 합계(원)</label><input id="wages" inputmode="numeric"></div><div class="field"><label>최근 3개월 총 일수</label><input id="periodDays" type="number" value="92"></div><div class="field"><label>총 재직일수</label><input id="serviceDays" type="number" placeholder="예: 1095"></div></div><div class="calc-actions"><button class="btn primary" onclick="calculate()">계산하기</button><button class="btn" onclick="resetCalc()">초기화</button></div><div id="result" class="result"></div><div class="notice">상여금, 연차수당, 평균임금 산정 범위 등에 따라 실제 금액은 달라질 수 있습니다.</div></div></main><footer class="site-footer"><div class="footer-inner"><strong>Savingio</strong><div>생활비 절약과 돈 관리를 돕는 실용 정보 사이트입니다.</div><div class="footer-links"><a href="/about.html">About</a><a href="/contact.html">Contact</a><a href="/privacy.html">Privacy</a><a href="/articles/">Articles</a></div></div></footer><script src="../js/app.js?v=4"></script><script>
function calculate(){
 const wages=numberValue('wages'), pd=numberValue('periodDays'), sd=numberValue('serviceDays');
 if(!wages||!pd||!sd){return showResult('임금 합계와 일수를 입력하세요.');}
 const avg=wages/pd;
 const severance=avg*30*(sd/365);
 showResult(`<strong>${money(severance)}</strong><dl><dt>1일 평균임금</dt><dd>${money(avg)}</dd><dt>재직기간</dt><dd>${(sd/365).toFixed(2)}년</dd></dl>`);
}</script></body></html>
