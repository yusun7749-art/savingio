<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>연차 계산기 | Savingio</title><meta name="description" content="입사일과 기준일을 입력해 예상 연차일수를 계산합니다."><link rel="canonical" href="https://savingio.com/calculators/leave.html"><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/calculator-drawer.css?v=18"></head><body><header class="site-header"><a class="logo" href="/">Savingio</a><nav><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a></nav></header><main class="calc-shell"><section class="calc-hero"><span class="section-kicker">연차 계산</span><h1>연차 계산기</h1><p>일반적인 근속기간 기준으로 예상 연차일수를 계산합니다.</p></section><section class="calc-card"><div class="field-grid"><div class="field"><label for="start">입사일</label><input id="start" type="date"></div><div class="field"><label for="base">기준일</label><input id="base" type="date"></div></div><div class="calc-actions"><button class="btn btn-primary" onclick="calcLeave()">계산하기</button></div><div id="leaveResult" class="result" hidden></div><div class="calc-note">출근율, 휴직, 회사 회계연도 기준 등에 따라 실제 부여일수는 달라질 수 있습니다.</div></section></main><script>const today=new Date().toISOString().slice(0,10);base.value=today;function calcLeave(){const s=new Date(start.value),b=new Date(base.value);if(!start.value||b<s)return;const days=Math.floor((b-s)/86400000),years=days/365.2425;let leave=years<1?Math.min(Math.floor(days/30),11):Math.min(15+Math.floor((Math.floor(years)-1)/2),25);leaveResult.hidden=false;leaveResult.innerHTML=`예상 연차일수<strong>${leave}일</strong><div class="result-grid"><div><span>재직일수</span>${days.toLocaleString()}일</div><div><span>근속연수</span>${years.toFixed(1)}년</div></div>`}</script><button type="button" class="sv-calc-trigger" aria-label="생활 계산기 열기" aria-expanded="false"><span class="sv-calc-trigger-icon">＋</span><span class="sv-calc-trigger-label">계산기</span></button><div class="sv-calc-backdrop" aria-hidden="true"></div><aside class="sv-calc-drawer" aria-hidden="true" aria-label="생활 계산기"><div class="sv-drawer-head"><div><small>QUICK CALCULATOR</small><h2>바로 계산하기</h2></div><button type="button" class="sv-drawer-close" aria-label="닫기">×</button></div><div class="sv-drawer-group"><p class="sv-drawer-group-title">급여·근로</p><div class="sv-drawer-list"><a class="sv-drawer-item" href="/calculators/salary.html"><i>급</i><div><strong>실수령액</strong><span>월급과 공제 항목 확인</span></div></a><a class="sv-drawer-item" href="/calculators/weekly-pay.html"><i>주</i><div><strong>주휴수당</strong><span>시급과 주 근로시간 기준</span></div></a><a class="sv-drawer-item" href="/calculators/severance.html"><i>퇴</i><div><strong>퇴직금</strong><span>임금과 재직기간 기준</span></div></a><a class="sv-drawer-item" href="/calculators/annual-leave.html"><i>일</i><div><strong>연차</strong><span>입사일과 기준일 입력</span></div></a></div></div><div class="sv-drawer-group"><p class="sv-drawer-group-title">금액·세금·대출</p><div class="sv-drawer-list"><a class="sv-drawer-item" href="/calculators/percentage.html"><i>%</i><div><strong>퍼센트</strong><span>비율·할인·증감 계산</span></div></a><a class="sv-drawer-item" href="/calculators/vat.html"><i>세</i><div><strong>부가세</strong><span>공급가액·합계금액 변환</span></div></a><a class="sv-drawer-item" href="/calculators/loan.html"><i>₩</i><div><strong>대출이자</strong><span>상환방식별 금액 비교</span></div></a></div></div><a class="sv-drawer-all" href="/calculators/">계산기 전체 보기 →</a></aside><script src="/js/calculator-drawer.js?v=18"></script></body></html>
