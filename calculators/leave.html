<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>연차 계산기 | Savingio</title><meta name="description" content="입사일과 기준일을 입력해 예상 연차일수를 계산합니다."><link rel="canonical" href="https://savingio.com/calculators/leave.html"><link rel="stylesheet" href="/css/style.css"></head><body><header class="site-header"><a class="logo" href="/">Savingio</a><nav><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a></nav></header><main class="calc-shell"><section class="calc-hero"><span class="section-kicker">연차 계산</span><h1>연차 계산기</h1><p>일반적인 근속기간 기준으로 예상 연차일수를 계산합니다.</p></section><section class="calc-card"><div class="field-grid"><div class="field"><label for="start">입사일</label><input id="start" type="date"></div><div class="field"><label for="base">기준일</label><input id="base" type="date"></div></div><div class="calc-actions"><button class="btn btn-primary" onclick="calcLeave()">계산하기</button></div><div id="leaveResult" class="result" hidden></div><div class="calc-note">출근율, 휴직, 회사 회계연도 기준 등에 따라 실제 부여일수는 달라질 수 있습니다.</div></section></main><script>const today=new Date().toISOString().slice(0,10);base.value=today;function calcLeave(){const s=new Date(start.value),b=new Date(base.value);if(!start.value||b<s)return;const days=Math.floor((b-s)/86400000),years=days/365.2425;let leave=years<1?Math.min(Math.floor(days/30),11):Math.min(15+Math.floor((Math.floor(years)-1)/2),25);leaveResult.hidden=false;leaveResult.innerHTML=`예상 연차일수<strong>${leave}일</strong><div class="result-grid"><div><span>재직일수</span>${days.toLocaleString()}일</div><div><span>근속연수</span>${years.toFixed(1)}년</div></div>`}</script></body></html>
