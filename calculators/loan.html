<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>대출이자 계산기 | Savingio</title><meta name="description" content="원금, 연 이율, 기간을 입력해 단순이자와 월평균 이자를 계산합니다."><link rel="stylesheet" href="../css/style.css?v=4"></head><body><header class="site-header"><div class="header-inner"><a class="logo" href="/">Savingio</a><nav class="nav"><a href="/">홈</a><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a><a href="/about.html">소개</a><a href="/contact.html">문의</a></nav></div></header><main class="calculator-wrap"><div class="calc-card"><h1>대출이자 계산기</h1><p class="desc">원금, 연 이율, 기간을 입력해 단순이자와 월평균 이자를 계산합니다.</p><div class="form-grid"><div class="field"><label>대출원금(원)</label><input id="principal" inputmode="numeric"></div><div class="field"><label>연 이율(%)</label><input id="rate" type="number" step="0.01"></div><div class="field"><label>기간(개월)</label><input id="months" type="number"></div></div><div class="calc-actions"><button class="btn primary" onclick="calculate()">계산하기</button><button class="btn" onclick="resetCalc()">초기화</button></div><div id="result" class="result"></div><div class="notice">단순이자 계산입니다. 원리금균등·원금균등 상환과 중도상환수수료는 반영하지 않습니다.</div></div></main><footer class="site-footer"><div class="footer-inner"><strong>Savingio</strong><div>생활비 절약과 돈 관리를 돕는 실용 정보 사이트입니다.</div><div class="footer-links"><a href="/about.html">About</a><a href="/contact.html">Contact</a><a href="/privacy.html">Privacy</a><a href="/articles/">Articles</a></div></div></footer><script src="../js/app.js?v=4"></script><script>
function calculate(){
 const p=numberValue('principal'), r=numberValue('rate'), m=numberValue('months');
 if(!p||!r||!m){return showResult('원금, 금리, 기간을 입력하세요.');}
 const interest=p*(r/100)*(m/12);
 showResult(`<strong>${money(interest)}</strong><dl><dt>월평균 이자</dt><dd>${money(interest/m)}</dd><dt>원금+이자 합계</dt><dd>${money(p+interest)}</dd></dl>`);
}</script></body></html>
