<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>대출이자 계산기 | Savingio</title><meta name="description" content="대출원금, 연이율, 기간으로 월 이자와 총이자를 계산합니다."><link rel="canonical" href="https://savingio.com/calculators/loan.html"><link rel="stylesheet" href="/css/style.css"></head><body><header class="site-header"><a class="logo" href="/">Savingio</a><nav><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a></nav></header><main class="calc-shell"><section class="calc-hero"><span class="section-kicker">금융 계산</span><h1>대출이자 계산기</h1><p>만기일시상환 기준의 단순 이자 추정치입니다.</p></section><section class="calc-card"><div class="field-grid"><div class="field"><label for="principal">대출원금(원)</label><input id="principal" type="number" value="10000000"></div><div class="field"><label for="rate">연이율(%)</label><input id="rate" type="number" step="0.01" value="5"></div><div class="field"><label for="months">기간(개월)</label><input id="months" type="number" value="12"></div></div><div class="calc-actions"><button class="btn btn-primary" onclick="calcLoan()">계산하기</button></div><div id="loanResult" class="result" hidden></div><div class="calc-note">원리금균등·원금균등 방식은 상환 구조가 달라 실제 이자와 차이가 있습니다.</div></section></main><script>function won(n){return Math.round(n).toLocaleString("ko-KR")+"원"}function calcLoan(){const p=+principal.value||0,r=(+rate.value||0)/100,m=+months.value||0,total=p*r*(m/12),monthly=m?total/m:0;loanResult.hidden=false;loanResult.innerHTML=`예상 총이자<strong>${won(total)}</strong><div class="result-grid"><div><span>월 이자</span>${won(monthly)}</div><div><span>만기 상환액</span>${won(p+total)}</div></div>`}</script></body></html>
