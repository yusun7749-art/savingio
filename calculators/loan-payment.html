<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>대출 원리금·이자 비교 계산기 | Savingio</title><meta name="description" content="대출원금, 연이율, 기간을 입력해 원리금균등 방식의 월 상환액과 총이자를 계산합니다."><meta name="robots" content="index,follow"><link rel="canonical" href="https://savingio.com/calculators/loan-payment.html"><link rel="stylesheet" href="/css/style.css?v=4"><link rel="stylesheet" href="/css/calculator-generation-v2046.css?v=1"></head><body class="cg-body" data-calculator-id="loan-payment"><header class="site-header"><div class="header-inner"><a class="logo" href="/">Savingio</a><nav class="nav"><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a><a href="/about.html">소개</a></nav></div></header><main class="cg-shell"><section class="cg-hero"><span>Savingio 해결 계산기</span><h1>대출 원리금·이자 비교 계산기</h1><p>대출원금, 연이율, 기간을 입력해 원리금균등 방식의 월 상환액과 총이자를 계산합니다.</p></section><section class="cg-card"><form id="calculator-form"><h2>1. 알고 있는 값을 입력하세요</h2><div class="cg-grid"><label class="cg-field"><span>대출원금</span><div class="cg-input-wrap"><input id="principal" name="principal" type="number" value="100000000" min="0" step="10000" required><em>원</em></div></label><label class="cg-field"><span>연이율</span><div class="cg-input-wrap"><input id="annualRate" name="annualRate" type="number" value="4.5" min="0" max="100" step="0.01" required><em>%</em></div></label><label class="cg-field"><span>상환기간</span><div class="cg-input-wrap"><input id="months" name="months" type="number" value="120" min="1" max="600" step="1" required><em>개월</em></div></label></div><button class="cg-primary" type="submit">계산 결과 확인</button><button class="cg-secondary" type="reset">초기화</button><p id="cg-error" role="alert"></p></form><section id="cg-result" class="cg-result" aria-live="polite" hidden><h2>2. 예상 결과</h2><p id="cg-main-label"></p><strong id="cg-main-value"></strong><div id="cg-breakdown"></div><div id="cg-smart-action" class="cg-smart-action" hidden><span id="cg-action-level"></span><h3 id="cg-action-title"></h3><p id="cg-action-description"></p><div id="cg-action-links"></div></div><div class="cg-next"><h3>함께 확인할 기본 안내</h3><a href="/articles/loan-refinancing-check.html">대환 가능성 점검 →</a><a href="/articles/loan-prepayment-fee-check.html">중도상환수수료 확인 →</a></div><p class="cg-notice">원리금균등 상환을 기준으로 한 추정값이며 실제 대출은 실행일, 금리변동, 수수료, 거치기간 등에 따라 달라집니다.</p></section></section></main><footer class="site-footer"><div class="footer-inner"><strong>Savingio</strong><div>계산 결과는 참고용이며 공식 기관과 계약 내용을 함께 확인하세요.</div></div></footer><script>(function(){
const form=document.getElementById('calculator-form'),result=document.getElementById('cg-result'),error=document.getElementById('cg-error');
const actionBox=document.getElementById('cg-smart-action'),actionRules=[{"max": 500000, "level": "manageable", "title": "중도상환수수료와 금리를 함께 비교하세요", "description": "월 상환액이 감당 가능해도 금리와 중도상환수수료를 비교하면 총이자를 줄일 수 있습니다.", "links": [["/articles/loan-prepayment-fee-check.html", "중도상환수수료 확인"], ["/articles/loan-refinancing-check.html", "대환 가능성 점검"]]}, {"max": 1200000, "level": "caution", "title": "고정비 대비 상환 비중을 점검하세요", "description": "월소득에서 대출 상환액이 차지하는 비율을 계산하고 추가 대출은 신중히 판단하세요.", "links": [["/articles/beginner-budget-plan.html", "가계예산 점검"], ["/articles/credit-score-management.html", "신용점수 관리"]]}, {"level": "risk", "title": "상환조건 조정을 우선 검토하세요", "description": "월 상환 부담이 크다면 연체 전에 금융회사와 만기·금리·상환방식 변경 가능성을 확인하세요.", "links": [["/articles/loan-refinancing-check.html", "대환대출 점검"], ["/articles/emergency-welfare-living-support.html", "긴급지원 확인"]]}],cid='loan-payment';
const won=n=>Math.round(n).toLocaleString('ko-KR')+'원';const v=id=>Number(document.getElementById(id).value||0);
const sid=(()=>{let x=sessionStorage.getItem('savingio_calc_sid');if(!x){x=(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random());sessionStorage.setItem('savingio_calc_sid',x)}return x})();
function bucket(n){if(n<100000)return'under_100k';if(n<500000)return'100k_500k';if(n<1000000)return'500k_1m';if(n<3000000)return'1m_3m';return'over_3m'}
function track(event,extra){const payload=Object.assign({event:event,calculator_id:cid,page:location.pathname,session_id:sid,timestamp:new Date().toISOString()},extra||{});window.dataLayer=window.dataLayer||[];window.dataLayer.push(payload);try{const q=JSON.parse(localStorage.getItem('savingio_calculator_events')||'[]');q.push(payload);localStorage.setItem('savingio_calculator_events',JSON.stringify(q.slice(-100)))}catch(e){}fetch('/api/calculator-events',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload),keepalive:true}).catch(()=>{})}
function selectAction(value){for(const rule of actionRules){if(rule.max==null||value<=Number(rule.max))return rule}return null}
function renderAction(value){const rule=selectAction(value);if(!rule){actionBox.hidden=true;return}document.getElementById('cg-action-level').textContent='맞춤 행동 · '+(rule.level||'guide');document.getElementById('cg-action-title').textContent=rule.title;document.getElementById('cg-action-description').textContent=rule.description;const links=document.getElementById('cg-action-links');links.innerHTML=(rule.links||[]).map(x=>'<a class="cg-action-link" href="'+x[0]+'">'+x[1]+' →</a>').join('');links.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>track('calculator_action_click',{action_level:rule.level,target_url:a.getAttribute('href'),result_bucket:bucket(value)})));actionBox.hidden=false;return rule}
function show(label,value,rows){document.getElementById('cg-main-label').textContent=label;document.getElementById('cg-main-value').textContent=won(value);document.getElementById('cg-breakdown').innerHTML=rows.map(r=>'<div><span>'+r[0]+'</span><b>'+(r[2]?Number(r[1]).toLocaleString('ko-KR')+r[2]:won(r[1]))+'</b></div>').join('');const rule=renderAction(value);result.hidden=false;result.scrollIntoView({behavior:'smooth',block:'start'});track('calculator_complete',{action_level:rule?rule.level:null,result_bucket:bucket(value)})}
let started=false;form.addEventListener('input',()=>{if(!started){started=true;track('calculator_start')}});
form.addEventListener('submit',e=>{e.preventDefault();error.textContent='';try{const p=v('principal'),annual=v('annualRate'),n=Math.max(1,v('months')),r=annual/100/12,payment=r===0?p/n:p*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1),total=payment*n;show('예상 월 상환액',payment,[['대출원금',p],['총 상환액',total],['총이자',total-p],['상환기간',n,'개월']]);}catch(err){error.textContent='입력값을 다시 확인해주세요.'}});form.addEventListener('reset',()=>{result.hidden=true;actionBox.hidden=true;error.textContent='';started=false});track('calculator_view');
})();</script></body></html>
