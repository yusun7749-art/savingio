<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>월급 실수령액 계산기 | Savingio</title><meta name="description" content="월 급여와 비과세액을 입력해 예상 실수령액을 계산합니다."><link rel="canonical" href="https://savingio.com/calculators/salary.html"><link rel="stylesheet" href="/css/style.css"></head><body><header class="site-header"><a class="logo" href="/">Savingio</a><nav><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a></nav></header><main class="calc-shell"><section class="calc-hero"><span class="section-kicker">급여 계산</span><h1>월급 실수령액 계산기</h1><p>간편 추정치입니다. 실제 공제액은 개인별 조건에 따라 달라질 수 있습니다.</p></section><section class="calc-card"><div class="field-grid"><div class="field"><label for="gross">월 급여(원)</label><input id="gross" type="number" min="0" value="3000000"></div><div class="field"><label for="taxfree">비과세액(원)</label><input id="taxfree" type="number" min="0" value="200000"></div></div><div class="calc-actions"><button class="btn btn-primary" onclick="calcSalary()">계산하기</button></div><div id="salaryResult" class="result" hidden></div><div class="calc-note">4대보험과 소득세는 간편 추정치입니다. 정확한 급여명세서는 회사와 공단 기준을 확인하세요.</div></section></main><script>function won(n){return Math.round(n).toLocaleString("ko-KR")+"원"}function calcSalary(){const g=+gross.value||0,t=+taxfree.value||0,b=Math.max(g-t,0),p=b*.045,h=b*.03545,l=b*.009,e=b*.009,tx=Math.max(b*.025,0),local=tx*.1,d=p+h+l+e+tx+local,net=g-d;salaryResult.hidden=false;salaryResult.innerHTML=`예상 실수령액<strong>${won(net)}</strong><div class="result-grid"><div><span>국민연금 추정</span>${won(p)}</div><div><span>건강보험 추정</span>${won(h)}</div><div><span>장기요양 추정</span>${won(l)}</div><div><span>고용보험 추정</span>${won(e)}</div><div><span>소득세 추정</span>${won(tx)}</div><div><span>지방소득세 추정</span>${won(local)}</div></div>`}</script></body></html>
