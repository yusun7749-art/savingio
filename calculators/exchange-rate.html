<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>환율 계산기 | 달러·엔화·유로·위안 환전 계산 | Savingio</title>
<meta name="description" content="달러, 엔화, 유로, 위안 등 주요 통화를 원화로 환산하고 환전 수수료를 포함한 예상 금액을 계산하세요.">
<link rel="canonical" href="https://savingio.com/calculators/exchange-rate.html">
<link rel="stylesheet" href="../css/style.css?v=8">
<link rel="stylesheet" href="../css/savingio-content-platform.css?v=8">
</head>
<body>
<header class="site-header"><div class="header-inner"><a class="logo" href="/">Savingio</a><nav class="nav"><a href="/">홈</a><a href="/articles/">정보센터</a><a href="/calculators/">계산기</a><a href="/about.html">소개</a><a href="/contact.html">문의</a></nav></div></header>
<main class="calculator-wrap">
  <div class="calc-card">
    <h1>환율 계산기</h1>
    <p class="desc">달러·엔화·유로·위안 등 주요 통화를 원화로 빠르게 환산합니다.</p>

    <div class="fx-grid">
      <div class="field">
        <label>보내는 통화</label>
        <select id="from">
          <option value="KRW">대한민국 원 (KRW)</option>
          <option value="USD">미국 달러 (USD)</option>
          <option value="JPY">일본 엔 (JPY)</option>
          <option value="EUR">유로 (EUR)</option>
          <option value="CNY">중국 위안 (CNY)</option>
          <option value="GBP">영국 파운드 (GBP)</option>
          <option value="AUD">호주 달러 (AUD)</option>
          <option value="CAD">캐나다 달러 (CAD)</option>
          <option value="CHF">스위스 프랑 (CHF)</option>
          <option value="SGD">싱가포르 달러 (SGD)</option>
          <option value="HKD">홍콩 달러 (HKD)</option>
        </select>
        <input id="amount" inputmode="decimal" value="100000" style="margin-top:10px">
      </div>

      <button class="fx-swap" type="button" id="swap" aria-label="통화 바꾸기">⇄</button>

      <div class="field">
        <label>받는 통화</label>
        <select id="to">
          <option value="USD">미국 달러 (USD)</option>
          <option value="KRW">대한민국 원 (KRW)</option>
          <option value="JPY">일본 엔 (JPY)</option>
          <option value="EUR">유로 (EUR)</option>
          <option value="CNY">중국 위안 (CNY)</option>
          <option value="GBP">영국 파운드 (GBP)</option>
          <option value="AUD">호주 달러 (AUD)</option>
          <option value="CAD">캐나다 달러 (CAD)</option>
          <option value="CHF">스위스 프랑 (CHF)</option>
          <option value="SGD">싱가포르 달러 (SGD)</option>
          <option value="HKD">홍콩 달러 (HKD)</option>
        </select>
        <div id="converted" class="result show" style="margin-top:10px"><strong>계산하기를 눌러주세요</strong></div>
      </div>
    </div>

    <div class="form-grid" style="margin-top:18px">
      <div class="field">
        <label>환전 수수료율(선택, %)</label>
        <input id="fee" type="number" step="0.01" value="0">
      </div>
      <div class="field">
        <label>직접 환율 입력(선택)</label>
        <input id="manualRate" inputmode="decimal" placeholder="1 보내는 통화 = 받는 통화">
      </div>
    </div>

    <div class="calc-actions">
      <button class="btn primary" type="button" id="convert">환율 계산하기</button>
      <button class="btn" type="button" onclick="resetCalc()">초기화</button>
    </div>

    <div class="fx-meta">
      <span class="fx-live"><span class="fx-dot"></span><span id="rateStatus">실시간 기준 환율 불러오기</span></span>
      <span id="rateDate"></span>
    </div>

    <div class="notice">환율은 기준 환율이며 실제 은행의 현찰 매매율, 우대율, 송금 수수료에 따라 금액이 달라질 수 있습니다.</div>
  </div>
</main>
<footer class="site-footer"><div class="footer-inner"><strong>Savingio</strong><div>돈이 새는 곳은 막고, 받을 돈은 찾도록 돕습니다.</div><div class="footer-links"><a href="/about.html">소개</a><a href="/contact.html">문의</a><a href="/privacy.html">개인정보처리방침</a></div></div></footer>
<script src="../js/app.js?v=8"></script>
<script src="../js/savingio-content-platform.js?v=8"></script>
<script>
const from=document.getElementById('from');
const to=document.getElementById('to');
const amount=document.getElementById('amount');
const fee=document.getElementById('fee');
const manualRate=document.getElementById('manualRate');
const converted=document.getElementById('converted');
const statusEl=document.getElementById('rateStatus');
const dateEl=document.getElementById('rateDate');

function fmtCurrency(value, code){
  try{return new Intl.NumberFormat('ko-KR',{style:'currency',currency:code,maximumFractionDigits:2}).format(value);}
  catch(e){return Number(value).toLocaleString('ko-KR',{maximumFractionDigits:2})+' '+code;}
}

async function getRate(){
  const manual=Number(manualRate.value);
  if(manual>0) return {rate:manual,date:'직접 입력'};
  if(from.value===to.value) return {rate:1,date:'동일 통화'};
  statusEl.textContent='환율 불러오는 중...';
  const response=await fetch(`https://api.frankfurter.app/latest?amount=1&from=${from.value}&to=${to.value}`);
  if(!response.ok) throw new Error('rate');
  const data=await response.json();
  return {rate:data.rates[to.value],date:data.date};
}

async function calculate(){
  const input=Number((amount.value||'').replace(/,/g,''));
  if(!input){converted.innerHTML='<strong>금액을 입력하세요.</strong>';return;}
  try{
    const info=await getRate();
    const gross=input*info.rate;
    const feeRate=Number(fee.value)||0;
    const feeAmount=gross*feeRate/100;
    const net=gross-feeAmount;
    converted.innerHTML=`<strong>${fmtCurrency(net,to.value)}</strong><dl><dt>적용 환율</dt><dd>1 ${from.value} = ${info.rate.toLocaleString('ko-KR',{maximumFractionDigits:6})} ${to.value}</dd><dt>환산 금액</dt><dd>${fmtCurrency(gross,to.value)}</dd><dt>수수료 예상</dt><dd>${fmtCurrency(feeAmount,to.value)}</dd></dl>`;
    statusEl.textContent=manualRate.value?'직접 입력 환율':'기준 환율 적용';
    dateEl.textContent=info.date?`기준일 ${info.date}`:'';
  }catch(e){
    converted.innerHTML='<strong>환율을 불러오지 못했습니다.</strong><p>직접 환율 입력란에 환율을 넣어 계산해 주세요.</p>';
    statusEl.textContent='수동 환율을 입력해 주세요';
  }
}

document.getElementById('convert').addEventListener('click',calculate);
document.getElementById('swap').addEventListener('click',()=>{
  const a=from.value; from.value=to.value; to.value=a; calculate();
});
[from,to].forEach(el=>el.addEventListener('change',calculate));
</script>
<a class="sv-calculator-fab" href="/calculators/" aria-label="생활 계산기 열기"><span>＋</span><span class="sv-fab-label">계산기</span></a></body>
</html>
