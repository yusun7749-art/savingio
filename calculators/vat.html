<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>부가세·공급가·합계 계산기 | Savingio</title><meta name="description" content="공급가액 또는 합계금액을 기준으로 부가세를 빠르게 나눠 계산합니다."><meta name="robots" content="index,follow"><link rel="canonical" href="https://savingio.com/calculators/vat.html"><link rel="stylesheet" href="/css/style.css?v=4"><link rel="stylesheet" href="/css/calculator-generation-v2046.css?v=1"></head><body class="cg-body" data-calculator-id="vat"><header class="site-header"><div class="header-inner"><a class="logo" href="/">Savingio</a><nav class="nav"><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a><a href="/about.html">소개</a></nav></div></header><main class="cg-shell"><section class="cg-hero"><span>Savingio 해결 계산기</span><h1>부가세·공급가·합계 계산기</h1><p>공급가액 또는 합계금액을 기준으로 부가세를 빠르게 나눠 계산합니다.</p></section><section class="cg-card"><form id="calculator-form"><h2>1. 알고 있는 값을 입력하세요</h2><div class="cg-grid"><label class="cg-field"><span>입력 금액</span><div class="cg-input-wrap"><input id="amount" name="amount" type="number" value="110000" min="0" step="1" required><em>원</em></div></label><label class="cg-field"><span>금액 기준</span><select id="amountType" name="amountType"><option value="total">부가세 포함 합계</option><option value="supply">공급가액</option></select></label><label class="cg-field"><span>부가세율</span><div class="cg-input-wrap"><input id="vatRate" name="vatRate" type="number" value="10" min="0" max="100" step="0.1" required><em>%</em></div></label></div><button class="cg-primary" type="submit">계산 결과 확인</button><button class="cg-secondary" type="reset">초기화</button><p id="cg-error" role="alert"></p></form><section id="cg-result" class="cg-result" aria-live="polite" hidden><h2>2. 예상 결과</h2><p id="cg-main-label"></p><strong id="cg-main-value"></strong><div id="cg-breakdown"></div><div id="cg-smart-action" class="cg-smart-action" hidden><span id="cg-action-level"></span><h3 id="cg-action-title"></h3><p id="cg-action-description"></p><div id="cg-action-links"></div></div><div class="cg-next"><h3>함께 확인할 기본 안내</h3><a href="/articles/tax-invoice-vs-cash-receipt.html">증빙 종류 확인 →</a><a href="/articles/general-vat-common-mistakes.html">부가세 실수 방지 →</a></div><p class="cg-notice">일반적인 세율 계산 도구입니다. 영세율·면세·간이과세 등은 별도 기준을 확인하세요.</p></section></section></main><footer class="site-footer"><div class="footer-inner"><strong>Savingio</strong><div>계산 결과는 참고용이며 공식 기관과 계약 내용을 함께 확인하세요.</div></div></footer><script>(function(){
const form=document.getElementById('calculator-form'),result=document.getElementById('cg-result'),error=document.getElementById('cg-error');
const actionBox=document.getElementById('cg-smart-action'),actionRules=[{"max": 100000, "level": "record", "title": "증빙을 바로 정리하세요", "description": "금액이 작아도 매입·매출 증빙을 신고기간 전에 분류해 두면 누락을 줄일 수 있습니다.", "links": [["/articles/tax-invoice-vs-cash-receipt.html", "적격증빙 구분"]]}, {"level": "reserve", "title": "부가세 납부자금을 따로 보관하세요", "description": "계산된 부가세는 매출이 아니라 납부 예정금으로 보고 별도 계좌에 분리하세요.", "links": [["/articles/vat-payment-extension-guide.html", "납부기한 확인"], ["/articles/vat-input-tax-deduction-items.html", "매입세액 공제 점검"]]}],cid='vat';
const won=n=>Math.round(n).toLocaleString('ko-KR')+'원';const v=id=>Number(document.getElementById(id).value||0);
const sid=(()=>{let x=sessionStorage.getItem('savingio_calc_sid');if(!x){x=(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random());sessionStorage.setItem('savingio_calc_sid',x)}return x})();
function bucket(n){if(n<100000)return'under_100k';if(n<500000)return'100k_500k';if(n<1000000)return'500k_1m';if(n<3000000)return'1m_3m';return'over_3m'}
function track(event,extra){const payload=Object.assign({event:event,calculator_id:cid,page:location.pathname,session_id:sid,timestamp:new Date().toISOString()},extra||{});window.dataLayer=window.dataLayer||[];window.dataLayer.push(payload);try{const q=JSON.parse(localStorage.getItem('savingio_calculator_events')||'[]');q.push(payload);localStorage.setItem('savingio_calculator_events',JSON.stringify(q.slice(-100)))}catch(e){}fetch('/api/calculator-events',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload),keepalive:true}).catch(()=>{})}
function selectAction(value){for(const rule of actionRules){if(rule.max==null||value<=Number(rule.max))return rule}return null}
function renderAction(value){const rule=selectAction(value);if(!rule){actionBox.hidden=true;return}document.getElementById('cg-action-level').textContent='맞춤 행동 · '+(rule.level||'guide');document.getElementById('cg-action-title').textContent=rule.title;document.getElementById('cg-action-description').textContent=rule.description;const links=document.getElementById('cg-action-links');links.innerHTML=(rule.links||[]).map(x=>'<a class="cg-action-link" href="'+x[0]+'">'+x[1]+' →</a>').join('');links.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>track('calculator_action_click',{action_level:rule.level,target_url:a.getAttribute('href'),result_bucket:bucket(value)})));actionBox.hidden=false;return rule}
function show(label,value,rows){document.getElementById('cg-main-label').textContent=label;document.getElementById('cg-main-value').textContent=won(value);document.getElementById('cg-breakdown').innerHTML=rows.map(r=>'<div><span>'+r[0]+'</span><b>'+(r[2]?Number(r[1]).toLocaleString('ko-KR')+r[2]:won(r[1]))+'</b></div>').join('');const rule=renderAction(value);result.hidden=false;result.scrollIntoView({behavior:'smooth',block:'start'});track('calculator_complete',{action_level:rule?rule.level:null,result_bucket:bucket(value)})}
let started=false;form.addEventListener('input',()=>{if(!started){started=true;track('calculator_start')}});
form.addEventListener('submit',e=>{e.preventDefault();error.textContent='';try{const amount=v('amount'),rate=v('vatRate')/100,type=document.getElementById('amountType').value;let supply,vat,total;if(type==='total'){supply=amount/(1+rate);vat=amount-supply;total=amount}else{supply=amount;vat=amount*rate;total=supply+vat}show('부가세',vat,[['공급가액',supply],['부가세',vat],['합계금액',total]]);}catch(err){error.textContent='입력값을 다시 확인해주세요.'}});form.addEventListener('reset',()=>{result.hidden=true;actionBox.hidden=true;error.textContent='';started=false});track('calculator_view');
})();</script></body></html>
