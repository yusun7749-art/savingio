<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>부가세 계산기 | Savingio</title><meta name="description" content="공급가액과 부가세 포함 금액을 서로 변환합니다."><link rel="stylesheet" href="../css/style.css?v=4"></head><body><header class="site-header"><div class="header-inner"><a class="logo" href="/">Savingio</a><nav class="nav"><a href="/">홈</a><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a><a href="/about.html">소개</a><a href="/contact.html">문의</a></nav></div></header><main class="calculator-wrap"><div class="calc-card"><h1>부가세 계산기</h1><p class="desc">공급가액과 부가세 포함 금액을 서로 변환합니다.</p><div class="form-grid"><div class="field"><label>계산 방식</label><select id="mode"><option value="add">공급가액에 부가세 추가</option><option value="split">합계금액에서 부가세 분리</option></select></div><div class="field"><label>금액(원)</label><input id="amount" inputmode="numeric"></div></div><div class="calc-actions"><button class="btn primary" onclick="calculate()">계산하기</button><button class="btn" onclick="resetCalc()">초기화</button></div><div id="result" class="result"></div><div class="notice">일반적인 10% 부가세 기준입니다. 면세·영세율·업종별 예외는 반영하지 않습니다.</div></div></main><footer class="site-footer"><div class="footer-inner"><strong>Savingio</strong><div>생활비 절약과 돈 관리를 돕는 실용 정보 사이트입니다.</div><div class="footer-links"><a href="/about.html">About</a><a href="/contact.html">Contact</a><a href="/privacy.html">Privacy</a><a href="/articles/">Articles</a></div></div></footer><script src="../js/app.js?v=4"></script><script>
function calculate(){
 const amount=numberValue('amount'), mode=document.getElementById('mode').value;
 if(!amount){return showResult('금액을 입력하세요.');}
 let supply,vat,total;
 if(mode==='add'){supply=amount;vat=amount*.1;total=supply+vat;}
 else{total=amount;supply=amount/1.1;vat=total-supply;}
 showResult(`<strong>${money(total)}</strong><dl><dt>공급가액</dt><dd>${money(supply)}</dd><dt>부가세</dt><dd>${money(vat)}</dd><dt>합계</dt><dd>${money(total)}</dd></dl>`);
}</script></body></html>
