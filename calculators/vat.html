<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>부가세 계산기 | Savingio</title><meta name="description" content="공급가액 또는 합계금액으로 부가세를 계산합니다."><link rel="canonical" href="https://savingio.com/calculators/vat.html"><link rel="stylesheet" href="/css/style.css"></head><body><header class="site-header"><a class="logo" href="/">Savingio</a><nav><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a></nav></header><main class="calc-shell"><section class="calc-hero"><span class="section-kicker">사업자 계산</span><h1>부가세 계산기</h1><p>공급가액 기준 또는 부가세 포함 금액 기준으로 계산하세요.</p></section><section class="calc-card"><div class="field-grid"><div class="field"><label for="amount">금액(원)</label><input id="amount" type="number" value="110000"></div><div class="field"><label for="mode">입력 기준</label><select id="mode"><option value="total">부가세 포함 합계금액</option><option value="supply">공급가액</option></select></div></div><div class="calc-actions"><button class="btn btn-primary" onclick="calcVat()">계산하기</button></div><div id="vatResult" class="result" hidden></div></section></main><script>function won(n){return Math.round(n).toLocaleString("ko-KR")+"원"}function calcVat(){const a=+amount.value||0;let s,v,t;if(mode.value==="total"){t=a;s=a/1.1;v=t-s}else{s=a;v=a*.1;t=s+v}vatResult.hidden=false;vatResult.innerHTML=`합계금액<strong>${won(t)}</strong><div class="result-grid"><div><span>공급가액</span>${won(s)}</div><div><span>부가세</span>${won(v)}</div></div>`}</script></body></html>
