<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>시급·주휴수당 계산기 | Savingio</title><meta name="description" content="시급과 주간 근무시간으로 주급과 예상 주휴수당을 계산합니다."><link rel="canonical" href="https://savingio.com/calculators/hourly.html"><link rel="stylesheet" href="/css/style.css"></head><body><header class="site-header"><a class="logo" href="/">Savingio</a><nav><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a></nav></header><main class="calc-shell"><section class="calc-hero"><span class="section-kicker">근로 계산</span><h1>시급·주휴수당 계산기</h1><p>주 15시간 이상 근무를 기준으로 간단히 계산합니다.</p></section><section class="calc-card"><div class="field-grid"><div class="field"><label for="wage">시급(원)</label><input id="wage" type="number" value="10320"></div><div class="field"><label for="hours">주간 근무시간</label><input id="hours" type="number" value="40"></div></div><div class="calc-actions"><button class="btn btn-primary" onclick="calcHourly()">계산하기</button></div><div id="hourlyResult" class="result" hidden></div><div class="calc-note">근로일수, 소정근로시간, 결근 여부에 따라 실제 주휴수당은 달라질 수 있습니다.</div></section></main><script>function won(n){return Math.round(n).toLocaleString("ko-KR")+"원"}function calcHourly(){const w=+wage.value||0,h=+hours.value||0,base=w*h,holiday=h>=15?w*Math.min(h/5,8):0,total=base+holiday;hourlyResult.hidden=false;hourlyResult.innerHTML=`예상 주급<strong>${won(total)}</strong><div class="result-grid"><div><span>기본 주급</span>${won(base)}</div><div><span>예상 주휴수당</span>${won(holiday)}</div></div>`}</script><a class="sv-calculator-fab" href="/calculators/" aria-label="생활 계산기 열기"><span>＋</span><span class="sv-fab-label">계산기</span></a></body></html>
