<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>시급·주휴수당 계산기 | Savingio</title><meta name="description" content="시급과 주간 근무시간으로 주급과 예상 주휴수당을 계산합니다."><link rel="canonical" href="https://savingio.com/calculators/hourly.html"><link rel="stylesheet" href="/css/style.css"><link rel="stylesheet" href="/css/calculator-drawer.css?v=18"></head><body><header class="site-header"><a class="logo" href="/">Savingio</a><nav><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a></nav></header><main class="calc-shell"><section class="calc-hero"><span class="section-kicker">근로 계산</span><h1>시급·주휴수당 계산기</h1><p>주 15시간 이상 근무를 기준으로 간단히 계산합니다.</p></section><section class="calc-card"><div class="field-grid"><div class="field"><label for="wage">시급(원)</label><input id="wage" type="number" value="10320"></div><div class="field"><label for="hours">주간 근무시간</label><input id="hours" type="number" value="40"></div></div><div class="calc-actions"><button class="btn btn-primary" onclick="calcHourly()">계산하기</button></div><div id="hourlyResult" class="result" hidden></div><div class="calc-note">근로일수, 소정근로시간, 결근 여부에 따라 실제 주휴수당은 달라질 수 있습니다.</div></section></main><script>function won(n){return Math.round(n).toLocaleString("ko-KR")+"원"}function calcHourly(){const w=+wage.value||0,h=+hours.value||0,base=w*h,holiday=h>=15?w*Math.min(h/5,8):0,total=base+holiday;hourlyResult.hidden=false;hourlyResult.innerHTML=`예상 주급<strong>${won(total)}</strong><div class="result-grid"><div><span>기본 주급</span>${won(base)}</div><div><span>예상 주휴수당</span>${won(holiday)}</div></div>`}</script><button type="button" class="sv-calc-trigger" aria-label="생활 계산기 열기" aria-expanded="false"><span class="sv-calc-trigger-icon">＋</span><span class="sv-calc-trigger-label">계산기</span></button><div class="sv-calc-backdrop" aria-hidden="true"></div><aside class="sv-calc-drawer" aria-hidden="true" aria-label="생활 계산기"><div class="sv-drawer-head"><div><small>QUICK CALCULATOR</small><h2>바로 계산하기</h2></div><button type="button" class="sv-drawer-close" aria-label="닫기">×</button></div><div class="sv-drawer-group"><p class="sv-drawer-group-title">급여·근로</p><div class="sv-drawer-list"><a class="sv-drawer-item" href="/calculators/salary.html"><i>급</i><div><strong>실수령액</strong><span>월급과 공제 항목 확인</span></div></a><a class="sv-drawer-item" href="/calculators/weekly-pay.html"><i>주</i><div><strong>주휴수당</strong><span>시급과 주 근로시간 기준</span></div></a><a class="sv-drawer-item" href="/calculators/severance.html"><i>퇴</i><div><strong>퇴직금</strong><span>임금과 재직기간 기준</span></div></a><a class="sv-drawer-item" href="/calculators/annual-leave.html"><i>일</i><div><strong>연차</strong><span>입사일과 기준일 입력</span></div></a></div></div><div class="sv-drawer-group"><p class="sv-drawer-group-title">금액·세금·대출</p><div class="sv-drawer-list"><a class="sv-drawer-item" href="/calculators/percentage.html"><i>%</i><div><strong>퍼센트</strong><span>비율·할인·증감 계산</span></div></a><a class="sv-drawer-item" href="/calculators/vat.html"><i>세</i><div><strong>부가세</strong><span>공급가액·합계금액 변환</span></div></a><a class="sv-drawer-item" href="/calculators/loan.html"><i>₩</i><div><strong>대출이자</strong><span>상환방식별 금액 비교</span></div></a></div></div><a class="sv-drawer-all" href="/calculators/">계산기 전체 보기 →</a></aside><script src="/js/calculator-drawer.js?v=18"></script></body></html>
