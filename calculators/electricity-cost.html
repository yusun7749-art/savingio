<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>전기요금·절약금액 계산기 | Savingio</title><meta name="description" content="월 사용량과 평균 단가를 입력해 예상 요금과 절약 목표 달성 시 금액을 확인합니다."><meta name="robots" content="index,follow"><link rel="canonical" href="https://savingio.com/calculators/electricity-cost.html"><link rel="stylesheet" href="/css/style.css?v=4"><link rel="stylesheet" href="/css/calculator-generation-v2046.css?v=1"></head><body class="cg-body" data-calculator-id="electricity-cost"><header class="site-header"><div class="header-inner"><a class="logo" href="/">Savingio</a><nav class="nav"><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a><a href="/about.html">소개</a></nav></div></header><main class="cg-shell"><section class="cg-hero"><span>Savingio 해결 계산기</span><h1>전기요금·절약금액 계산기</h1><p>월 사용량과 평균 단가를 입력해 예상 요금과 절약 목표 달성 시 금액을 확인합니다.</p></section><section class="cg-card"><form id="calculator-form"><h2>1. 알고 있는 값을 입력하세요</h2><div class="cg-grid"><label class="cg-field"><span>월 사용량</span><div class="cg-input-wrap"><input id="usage" name="usage" type="number" value="350" min="0" step="1" required><em>kWh</em></div></label><label class="cg-field"><span>평균 단가</span><div class="cg-input-wrap"><input id="unitPrice" name="unitPrice" type="number" value="180" min="0" step="1" required><em>원/kWh</em></div></label><label class="cg-field"><span>절약 목표</span><div class="cg-input-wrap"><input id="savingPercent" name="savingPercent" type="number" value="10" min="0" max="100" step="1" required><em>%</em></div></label></div><button class="cg-primary" type="submit">계산 결과 확인</button><button class="cg-secondary" type="reset">초기화</button><p id="cg-error" role="alert"></p></form><section id="cg-result" class="cg-result" aria-live="polite" hidden><h2>2. 예상 결과</h2><p id="cg-main-label"></p><strong id="cg-main-value"></strong><div id="cg-breakdown"></div><div id="cg-smart-action" class="cg-smart-action" hidden><span id="cg-action-level"></span><h3 id="cg-action-title"></h3><p id="cg-action-description"></p><div id="cg-action-links"></div></div><div class="cg-next"><h3>함께 확인할 기본 안내</h3><a href="/articles/electricity-bill-saving.html">전기요금 절약 방법 →</a><a href="/articles/summer-electricity-tier-check-2026.html">여름 누진구간 확인 →</a></div><p class="cg-notice">실제 전기요금은 기본요금, 누진구간, 기후환경요금, 연료비조정액, 부가세 등에 따라 달라집니다.</p></section></section></main><footer class="site-footer"><div class="footer-inner"><strong>Savingio</strong><div>계산 결과는 참고용이며 공식 기관과 계약 내용을 함께 확인하세요.</div></div></footer><script>(function(){
const form=document.getElementById('calculator-form'),result=document.getElementById('cg-result'),error=document.getElementById('cg-error');
const actionBox=document.getElementById('cg-smart-action'),actionRules=[{"max": 50000, "level": "stable", "title": "현재 사용량을 유지하며 대기전력을 점검하세요", "description": "요금이 낮은 편이라도 멀티탭과 대기전력을 정리하면 추가 절약이 가능합니다.", "links": [["/articles/electricity-bill-saving.html", "전기요금 절약 습관"]]}, {"max": 100000, "level": "warning", "title": "누진구간과 냉방기 사용을 확인하세요", "description": "사용량이 늘어난 가전과 시간대를 찾아 절약 효과가 큰 항목부터 줄이세요.", "links": [["/articles/summer-electricity-tier-check-2026.html", "누진구간 확인"], ["/articles/air-conditioner-electricity-saving.html", "에어컨 전기세 줄이기"]]}, {"level": "urgent", "title": "사용량 급증 원인을 먼저 찾으세요", "description": "지난달 고지서와 비교하고 에어컨·건조기·제습기 사용량을 각각 점검해야 합니다.", "links": [["/articles/summer-electricity-usage-check-2026.html", "사용량 급증 점검"], ["/articles/electricity-discount-card-guide.html", "할인 제도 확인"]]}],cid='electricity-cost';
const won=n=>Math.round(n).toLocaleString('ko-KR')+'원';const v=id=>Number(document.getElementById(id).value||0);
const sid=(()=>{let x=sessionStorage.getItem('savingio_calc_sid');if(!x){x=(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random());sessionStorage.setItem('savingio_calc_sid',x)}return x})();
function bucket(n){if(n<100000)return'under_100k';if(n<500000)return'100k_500k';if(n<1000000)return'500k_1m';if(n<3000000)return'1m_3m';return'over_3m'}
function track(event,extra){const payload=Object.assign({event:event,calculator_id:cid,page:location.pathname,session_id:sid,timestamp:new Date().toISOString()},extra||{});window.dataLayer=window.dataLayer||[];window.dataLayer.push(payload);try{const q=JSON.parse(localStorage.getItem('savingio_calculator_events')||'[]');q.push(payload);localStorage.setItem('savingio_calculator_events',JSON.stringify(q.slice(-100)))}catch(e){}fetch('/api/calculator-events',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload),keepalive:true}).catch(()=>{})}
function selectAction(value){for(const rule of actionRules){if(rule.max==null||value<=Number(rule.max))return rule}return null}
function renderAction(value){const rule=selectAction(value);if(!rule){actionBox.hidden=true;return}document.getElementById('cg-action-level').textContent='맞춤 행동 · '+(rule.level||'guide');document.getElementById('cg-action-title').textContent=rule.title;document.getElementById('cg-action-description').textContent=rule.description;const links=document.getElementById('cg-action-links');links.innerHTML=(rule.links||[]).map(x=>'<a class="cg-action-link" href="'+x[0]+'">'+x[1]+' →</a>').join('');links.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>track('calculator_action_click',{action_level:rule.level,target_url:a.getAttribute('href'),result_bucket:bucket(value)})));actionBox.hidden=false;return rule}
function show(label,value,rows){document.getElementById('cg-main-label').textContent=label;document.getElementById('cg-main-value').textContent=won(value);document.getElementById('cg-breakdown').innerHTML=rows.map(r=>'<div><span>'+r[0]+'</span><b>'+(r[2]?Number(r[1]).toLocaleString('ko-KR')+r[2]:won(r[1]))+'</b></div>').join('');const rule=renderAction(value);result.hidden=false;result.scrollIntoView({behavior:'smooth',block:'start'});track('calculator_complete',{action_level:rule?rule.level:null,result_bucket:bucket(value)})}
let started=false;form.addEventListener('input',()=>{if(!started){started=true;track('calculator_start')}});
form.addEventListener('submit',e=>{e.preventDefault();error.textContent='';try{const usage=v('usage'),price=v('unitPrice'),pct=v('savingPercent'),current=usage*price,savedUsage=usage*pct/100,saving=savedUsage*price;show('예상 월 전기요금',current,[['절약 목표 사용량',savedUsage,'kWh'],['예상 절약액',saving],['절약 후 예상 요금',current-saving]]);}catch(err){error.textContent='입력값을 다시 확인해주세요.'}});form.addEventListener('reset',()=>{result.hidden=true;actionBox.hidden=true;error.textContent='';started=false});track('calculator_view');
})();</script></body></html>
