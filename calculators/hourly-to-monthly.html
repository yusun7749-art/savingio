<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>시급 월급 환산 계산기 | Savingio</title><meta name="description" content="시급, 주당 근무시간, 월 근무주 수를 기준으로 예상 월급을 계산합니다."><meta name="robots" content="index,follow"><link rel="canonical" href="https://savingio.com/calculators/hourly-to-monthly.html"><link rel="stylesheet" href="/css/style.css?v=4"><link rel="stylesheet" href="/css/calculator-generation-v2046.css?v=1"></head><body class="cg-body" data-calculator-id="hourly-to-monthly"><header class="site-header"><div class="header-inner"><a class="logo" href="/">Savingio</a><nav class="nav"><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a><a href="/about.html">소개</a></nav></div></header><main class="cg-shell"><section class="cg-hero"><span>Savingio 해결 계산기</span><h1>시급 월급 환산 계산기</h1><p>시급, 주당 근무시간, 월 근무주 수를 기준으로 예상 월급을 계산합니다.</p></section><section class="cg-card"><form id="calculator-form"><h2>1. 알고 있는 값을 입력하세요</h2><div class="cg-grid"><label class="cg-field"><span>시급</span><div class="cg-input-wrap"><input id="hourlyWage" name="hourlyWage" type="number" value="10320" min="0" step="10" required><em>원</em></div></label><label class="cg-field"><span>주당 근무시간</span><div class="cg-input-wrap"><input id="weeklyHours" name="weeklyHours" type="number" value="40" min="0" max="168" step="0.5" required><em>시간</em></div></label><label class="cg-field"><span>월 환산 주 수</span><div class="cg-input-wrap"><input id="weeks" name="weeks" type="number" value="4.345" min="1" max="6" step="0.01" required><em>주</em></div></label></div><button class="cg-primary" type="submit">계산 결과 확인</button><button class="cg-secondary" type="reset">초기화</button><p id="cg-error" role="alert"></p></form><section id="cg-result" class="cg-result" aria-live="polite" hidden><h2>2. 예상 결과</h2><p id="cg-main-label"></p><strong id="cg-main-value"></strong><div id="cg-breakdown"></div><div id="cg-smart-action" class="cg-smart-action" hidden><span id="cg-action-level"></span><h3 id="cg-action-title"></h3><p id="cg-action-description"></p><div id="cg-action-links"></div></div><div class="cg-next"><h3>함께 확인할 기본 안내</h3><a href="/articles/salary-budget-guide.html">월급 관리 방법 보기 →</a><a href="/articles/salary-slip-check-guide.html">급여명세서 확인하기 →</a></div><p class="cg-notice">주휴수당과 실제 근로일수는 근로계약 및 법정 요건에 따라 달라질 수 있습니다.</p></section></section></main><footer class="site-footer"><div class="footer-inner"><strong>Savingio</strong><div>계산 결과는 참고용이며 공식 기관과 계약 내용을 함께 확인하세요.</div></div></footer><script>(function(){
const form=document.getElementById('calculator-form'),result=document.getElementById('cg-result'),error=document.getElementById('cg-error');
const actionBox=document.getElementById('cg-smart-action'),actionRules=[{"max": 1500000, "level": "check", "title": "근로시간과 주휴수당을 확인하세요", "description": "예상액이 낮다면 실제 근무시간과 주휴수당 적용 여부를 근로계약서와 비교하세요.", "links": [["/articles/salary-slip-check-guide.html", "급여명세서 확인"], ["/articles/salary-budget-guide.html", "적은 월급 예산 짜기"]]}, {"level": "plan", "title": "월 실수입 기준으로 지출 한도를 정하세요", "description": "불규칙 근무라면 최근 3개월 평균 수입으로 고정비 한도를 잡는 편이 안전합니다.", "links": [["/articles/monthly-budget-planner.html", "월 예산표 만들기"]]}],cid='hourly-to-monthly';
const won=n=>Math.round(n).toLocaleString('ko-KR')+'원';const v=id=>Number(document.getElementById(id).value||0);
const sid=(()=>{let x=sessionStorage.getItem('savingio_calc_sid');if(!x){x=(crypto.randomUUID?crypto.randomUUID():Date.now()+'-'+Math.random());sessionStorage.setItem('savingio_calc_sid',x)}return x})();
function bucket(n){if(n<100000)return'under_100k';if(n<500000)return'100k_500k';if(n<1000000)return'500k_1m';if(n<3000000)return'1m_3m';return'over_3m'}
function track(event,extra){const payload=Object.assign({event:event,calculator_id:cid,page:location.pathname,session_id:sid,timestamp:new Date().toISOString()},extra||{});window.dataLayer=window.dataLayer||[];window.dataLayer.push(payload);try{const q=JSON.parse(localStorage.getItem('savingio_calculator_events')||'[]');q.push(payload);localStorage.setItem('savingio_calculator_events',JSON.stringify(q.slice(-100)))}catch(e){}fetch('/api/calculator-events',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload),keepalive:true}).catch(()=>{})}
function selectAction(value){for(const rule of actionRules){if(rule.max==null||value<=Number(rule.max))return rule}return null}
function renderAction(value){const rule=selectAction(value);if(!rule){actionBox.hidden=true;return}document.getElementById('cg-action-level').textContent='맞춤 행동 · '+(rule.level||'guide');document.getElementById('cg-action-title').textContent=rule.title;document.getElementById('cg-action-description').textContent=rule.description;const links=document.getElementById('cg-action-links');links.innerHTML=(rule.links||[]).map(x=>'<a class="cg-action-link" href="'+x[0]+'">'+x[1]+' →</a>').join('');links.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>track('calculator_action_click',{action_level:rule.level,target_url:a.getAttribute('href'),result_bucket:bucket(value)})));actionBox.hidden=false;return rule}
function show(label,value,rows){document.getElementById('cg-main-label').textContent=label;document.getElementById('cg-main-value').textContent=won(value);document.getElementById('cg-breakdown').innerHTML=rows.map(r=>'<div><span>'+r[0]+'</span><b>'+(r[2]?Number(r[1]).toLocaleString('ko-KR')+r[2]:won(r[1]))+'</b></div>').join('');const rule=renderAction(value);result.hidden=false;result.scrollIntoView({behavior:'smooth',block:'start'});track('calculator_complete',{action_level:rule?rule.level:null,result_bucket:bucket(value)})}
let started=false;form.addEventListener('input',()=>{if(!started){started=true;track('calculator_start')}});
form.addEventListener('submit',e=>{e.preventDefault();error.textContent='';try{const wage=v('hourlyWage'),hours=v('weeklyHours'),weeks=v('weeks'),base=wage*hours*weeks,weeklyAllowance=hours>=15?wage*(hours/5)*weeks:0;show('예상 월급',base+weeklyAllowance,[['기본급 추정',base],['주휴수당 추정',weeklyAllowance],['월 환산 근무시간',hours*weeks,'시간']]);}catch(err){error.textContent='입력값을 다시 확인해주세요.'}});form.addEventListener('reset',()=>{result.hidden=true;actionBox.hidden=true;error.textContent='';started=false});track('calculator_view');
})();</script></body></html>
