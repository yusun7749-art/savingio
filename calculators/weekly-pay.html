<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>주휴수당 계산기 | Savingio</title><meta name="description" content="시급과 주 근로시간을 입력해 예상 주휴수당을 계산합니다."><link rel="stylesheet" href="../css/style.css?v=4"></head><body><header class="site-header"><div class="header-inner"><a class="logo" href="/">Savingio</a><nav class="nav"><a href="/">홈</a><a href="/articles/">전체 글</a><a href="/calculators/">계산기</a><a href="/about.html">소개</a><a href="/contact.html">문의</a></nav></div></header><main class="calculator-wrap"><div class="calc-card"><h1>주휴수당 계산기</h1><p class="desc">시급과 주 근로시간을 입력해 예상 주휴수당을 계산합니다.</p><div class="form-grid"><div class="field"><label>시급(원)</label><input id="wage" inputmode="numeric" placeholder="예: 12000"></div><div class="field"><label>주 소정근로시간</label><input id="hours" type="number" step="0.5" placeholder="예: 40"></div><div class="field"><label>주 근무일수</label><input id="days" type="number" value="5"></div></div><div class="calc-actions"><button class="btn primary" onclick="calculate()">계산하기</button><button class="btn" onclick="resetCalc()">초기화</button></div><div id="result" class="result"></div><div class="notice">주휴수당 적용 여부는 근로계약과 소정근로일 개근 등 조건에 따라 달라질 수 있습니다.</div></div></main><footer class="site-footer"><div class="footer-inner"><strong>Savingio</strong><div>생활비 절약과 돈 관리를 돕는 실용 정보 사이트입니다.</div><div class="footer-links"><a href="/about.html">About</a><a href="/contact.html">Contact</a><a href="/privacy.html">Privacy</a><a href="/articles/">Articles</a></div></div></footer><script src="../js/app.js?v=4"></script><script>
function calculate(){
 const wage=numberValue('wage'), hours=numberValue('hours'), days=numberValue('days');
 if(!wage||!hours||!days){return showResult('시급, 근로시간, 근무일수를 입력하세요.');}
 const daily=hours/days;
 const weekly=daily*wage;
 showResult(`<strong>${money(weekly)}</strong><dl><dt>1일 평균 소정근로시간</dt><dd>${daily.toFixed(2)}시간</dd><dt>예상 주휴수당</dt><dd>${money(weekly)}</dd></dl>`);
}</script></body></html>
